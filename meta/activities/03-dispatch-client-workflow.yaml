id: dispatch-client-workflow
version: 5.5.2
name: Dispatch Client Workflow
description: Drive the client workflow's activity loop by dispatching a disposable worker per activity.
required: true
steps:
  - kind: action
    id: verify-preconditions
    actions:
      - action: validate
        target: client_session_index
        message: Cannot dispatch without a client session_index; initialize-session must run first
  - kind: action
    id: prime-initial-activity
    actions:
      - action: set
        target: current_activity
        value: initialActivity
  - kind: loop
    id: client-activity-loop
    name: Client Activity Loop
    loopType: while
    condition:
      type: simple
      variable: current_activity
      operator: "!="
      value: null
    maxIterations: 200
    steps:
      - kind: technique
        id: dispatch-activity
        technique:
          name: workflow-engine::dispatch-activity
          inputs:
            activity_id: current_activity
            session_index: client_session_index
            agent_technique: workflow-engine::activity-worker
            state: variables
      - kind: technique
        id: present-yielded-checkpoint
        when: worker_yielded_checkpoint == true
        technique:
          name: workflow-engine::present-checkpoint-to-user
          inputs:
            session_index: client_session_index
      - kind: technique
        id: respond-yielded-checkpoint
        when: worker_yielded_checkpoint == true
        technique:
          name: workflow-engine::respond-checkpoint
          inputs:
            session_index: client_session_index
            checkpoint_resolution: user_selection
      - kind: technique
        id: commit-activity-artifacts
        when: worker_yielded_checkpoint == false
        technique:
          name: workflow-engine::commit-and-persist
          inputs:
            activity_id: current_activity
      - kind: action
        id: advance-activity
        when: worker_yielded_checkpoint == false
        actions:
          - action: set
            target: current_activity
            value: "{worker_result.next_activity_id}"
transitions:
  - to: end-workflow
    condition:
      type: simple
      variable: current_activity
      operator: ==
      value: null
outcome:
  - The client workflow has executed end to end with its artifacts committed and state persisted at every activity boundary
  - The user retained control over every decision point — checkpoints surfaced to them and their selections steered the workflow
  - The client workflow has no further activities to run, so the meta can proceed to close it out

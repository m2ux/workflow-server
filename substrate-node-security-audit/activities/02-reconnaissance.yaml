id: reconnaissance
version: 3.4.0
name: Reconnaissance
description: Run codebase reconnaissance and security decomposition.
required: true
techniques:
  - scatter-gather
steps:
  - kind: action
    id: announce-start
    actions:
      - action: log
        message: Starting codebase reconnaissance (§1.2) — dispatching reconnaissance sub-agent
  - kind: technique
    id: compose-reconnaissance-agent
    technique: dispatch-sub-agents::compose-roster-briefs
  - kind: technique
    id: dispatch-reconnaissance-agent
    technique: orchestration-patterns::dispatch-workers
  - kind: technique
    id: verify-reconnaissance-files
    technique:
      name: dispatch-sub-agents::verify-output-files
      inputs:
        expected_output_files: r-crate-map.json, r-function-registry.json, r-reconnaissance-data.json
  - kind: technique
    id: compose-security-architecture-agent
    technique: dispatch-sub-agents::compose-roster-briefs
  - kind: technique
    id: dispatch-security-architecture-agent
    technique: orchestration-patterns::dispatch-workers
  - kind: technique
    id: verify-security-architecture-file
    technique:
      name: dispatch-sub-agents::verify-output-files
      inputs:
        expected_output_files: s-architectural-analysis.json
  - kind: technique
    id: map-vulnerability-domains
    technique: map-vulnerability-domains
  - kind: technique
    id: assign-agent-groups
    technique: dispatch-sub-agents::assign-roster
  - kind: technique
    id: route-reconnaissance-leads
    technique: dispatch-sub-agents::route-leads
  - kind: action
    id: finalize-activity
    actions:
      - action: log
        message: Reconnaissance complete — architecture mapped and function registry built
      - action: set
        target: reconnaissance_complete
        value: true
transitions:
  - to: primary-audit
    isDefault: true
outcome:
  - Codebase map and function registry available for primary audit dispatch
  - Security architecture analysis persisted for cross-boundary checks
  - Every reconnaissance lead routed to a roster agent

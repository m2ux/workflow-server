id: scope-setup
version: 2.1.0
name: Scope Setup
description: Set up the audit scope and planning folder.
required: true
steps:
  - kind: action
    id: announce-start
    actions:
      - action: log
        message: Starting security audit scope setup
  - kind: technique
    id: setup-target
    technique: setup-audit-target
  - kind: technique
    id: index-codebase
    technique:
      name: gitnexus-operations::analyze
      inputs:
        repo_path: target_submodule
    actions:
      - action: set
        target: gitnexus_available
        value: true
        description: Reaching this action implies indexing succeeded (analyze failure fails the step); the variable's defaultValue false covers the un-run or failed path. Gates the graph-based structural analysis in reconnaissance, function-registry, and the static-analysis structural checks.
  - kind: action
    id: announce-completion
    actions:
      - action: log
        message: Scope setup complete — target confirmed and planning folder created
transitions:
  - to: reconnaissance
    isDefault: true
outcome:
  - Downstream analysis runs against a single confirmed, reproducible target pinned to an exact commit
  - Any reference report is quarantined out of scope until Phase 5, so the audit stays independent of it
  - Known-vulnerable dependencies are surfaced (or their absence explicitly noted) before code review begins
  - A reviewed file inventory establishes the in-scope surface every agent must cover
  - A working artifact home exists where every phase reads and writes shared state
  - The target's GitNexus index status is established, so downstream phases can prefer graph-based structural analysis over manual enumeration and grep tracing wherever the index is available

id: primary-audit
version: 4.20.0
name: Primary Audit
description: Multi-agent primary audit via concurrent dispatch with verification and merge.
required: true
techniques:
  - scatter-gather
steps:
  - kind: action
    id: announce-start
    actions:
      - action: log
        message: Starting primary audit — concurrent multi-agent dispatch
  - kind: technique
    id: compose-all-agents
    technique: dispatch-sub-agents::compose-roster-briefs
  - kind: technique
    id: dispatch-all-agents
    technique: orchestration-patterns::dispatch-workers
  - kind: technique
    id: gather-all-agents
    technique:
      name: orchestration-patterns::gather-results
      inputs:
        expected_ids: worker_briefs
  - kind: technique
    id: verify-checklist-prompt-coverage
    technique: verify-sub-agent-output
  - kind: technique
    id: verify-dispatch-completeness
    technique: verify-sub-agent-output
  - kind: technique
    id: collect-all
    technique: dispatch-sub-agents::collect-results
  - kind: technique
    id: verify-agent-output-files
    technique:
      name: dispatch-sub-agents::verify-output-files
      inputs:
        expected_output_files: a1-nto.json, a2-midnight-ledger.json, a3-node-startup.json, a4-node-consensus.json, a5-runtime.json, a6-primitives.json, a7-governance.json, b-static-analysis.json, d1-ledger-helpers.json, d2-toolkit.json
  - kind: technique
    id: compose-verification-agent
    technique: dispatch-sub-agents::compose-roster-briefs
  - kind: technique
    id: dispatch-verification-agent
    technique: orchestration-patterns::dispatch-workers
  - kind: technique
    id: compose-gap-redispatch
    technique: dispatch-sub-agents::compose-roster-briefs
  - kind: technique
    id: act-on-gap-report
    technique: orchestration-patterns::dispatch-workers
  - kind: technique
    id: compose-merge-agent
    technique: dispatch-sub-agents::compose-roster-briefs
  - kind: technique
    id: dispatch-merge-agent
    technique: orchestration-patterns::dispatch-workers
  - kind: technique
    id: preserve-verification-report
    technique: dispatch-sub-agents::verify-output-files
  - kind: action
    id: finalize-activity
    actions:
      - action: log
        message: Primary audit complete — findings collected from all agent groups
      - action: set
        target: dispatch_complete
        value: true
      - action: set
        target: verification_complete
        value: true
      - action: set
        target: merge_complete
        value: true
      - action: set
        target: primary_audit_complete
        value: true
transitions:
  - to: adversarial-verification
    isDefault: true
outcome:
  - Every priority-1/2 crate has been evaluated against the full §3 checklist in a dedicated context window, giving depth no single agent could reach
  - Mechanical and pattern-based weaknesses across the whole in-scope surface are caught independently of the human-led review
  - Storage lifecycle pairing is known, so unbounded-growth and orphaned-state risks can be judged from insert/remove completeness
  - Toolkit code has guaranteed minimum-checklist coverage, closing the gap where benign-looking helpers are usually skimmed

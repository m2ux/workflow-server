id: primary-scan
version: 1.3.0
name: Primary Scan
description: Run per-submodule scanner agents and merge their findings.
techniques:
  - scatter-gather
  - execute-cicd-audit
required: true
steps:
  - kind: action
    id: announce-start
    actions:
      - action: log
        message: Starting primary scan — dispatching per-submodule scanner agents
  - kind: technique
    id: compose-all-scanners
    technique: dispatch-scanners::compose-scanner-briefs
  - kind: technique
    id: dispatch-all-scanners
    technique:
      name: orchestration-patterns::dispatch-workers
      inputs:
        concurrency: scanners_assigned
  - kind: technique
    id: gather-all-scanners
    technique:
      name: orchestration-patterns::gather-results
      inputs:
        expected_ids: worker_briefs
  - kind: technique
    id: verify-dispatch-completeness
    technique: dispatch-scanners::verify-dispatch-completeness
  - kind: technique
    id: collect-scanner-results
    technique: dispatch-scanners::collect-results
  - kind: technique
    id: verify-scanner-output-files
    technique: dispatch-scanners::verify-output-files
  - kind: technique
    id: compose-verification-agent
    technique: dispatch-scanners::compose-verification-brief
  - kind: technique
    id: dispatch-verification-agent
    technique: orchestration-patterns::dispatch-workers
  - kind: technique
    id: compose-gap-redispatch
    technique: dispatch-scanners::compose-gap-briefs
  - kind: technique
    id: act-on-gap-report
    technique: orchestration-patterns::dispatch-workers
  - kind: technique
    id: compose-merge-agent
    technique: dispatch-scanners::compose-merge-brief
  - kind: technique
    id: dispatch-merge-agent
    technique: orchestration-patterns::dispatch-workers
  - kind: technique
    id: validate-reconciliation
    technique: dispatch-scanners::verify-reconciliation
  - kind: action
    id: finalize-activity
    actions:
      - action: log
        message: Primary scan complete — all findings merged and reconciled
      - action: set
        message: primary_scan_complete=true
transitions:
  - to: report-generation
    isDefault: true
    condition:
      type: and
      conditions:
        - type: simple
          variable: verification_complete
          operator: ==
          value: true
        - type: simple
          variable: merge_complete
          operator: ==
          value: true
outcome:
  - Every in-scope workflow file has been scanned for all seven vulnerability classes, with independent verification that no file or pattern was skipped
  - "The audit speaks with one voice: a single deduplicated, cross-correlated finding set where every scanner finding is reconciled and accounted for"
  - Findings are trustworthy and complete enough to drive severity scoring and the final report

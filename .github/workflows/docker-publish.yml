name: Build and Publish Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: docker-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Typecheck server source
        run: npm run typecheck

      - name: Test stdio transport
        env:
          WORKTREE_ROOT: ${{ github.workspace }}
        run: |
          timeout 5s node dist/index.js --transport=stdio || EXIT=$?
          # 0 = clean exit on stdin EOF; 124 = timeout killed a waiting server.
          if [ -n "${EXIT:-}" ] && [ "$EXIT" -ne 124 ]; then
            echo "Unexpected stdio transport exit: $EXIT"
            exit 1
          fi

      - name: Test HTTP transport
        env:
          WORKTREE_ROOT: ${{ github.workspace }}
        run: |
          node dist/index.js --transport=http &
          SERVER_PID=$!
          READY=false
          for i in {1..15}; do
            sleep 1
            if curl -fs http://localhost:3000/health >/dev/null && curl -fs http://localhost:3000/ready >/dev/null; then
              READY=true
              break
            fi
          done
          kill -TERM $SERVER_PID || true
          wait $SERVER_PID || true
          if [ "$READY" != "true" ]; then
            echo "HTTP transport health/readiness checks failed"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=phase1-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Scan image for vulnerabilities
        # Pinned to v0.35.0 (SHA 57a97c7) — mitigation for CVE-2026-33634 / Trivy supply-chain compromise
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        if: github.event_name != 'pull_request'
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:phase1-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v2
        if: github.event_name != 'pull_request'
        with:
          sarif_file: 'trivy-results.sarif'

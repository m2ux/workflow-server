name: Deploy documentation site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'src/**'
      - 'schemas/*.schema.json'
      - 'scripts/generate-site-data.ts'
      - 'scripts/check-site-links.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-docs.yml'
  pull_request:
    paths:
      - 'site/**'
      - 'src/**'
      - 'schemas/*.schema.json'
      - 'scripts/generate-site-data.ts'
      - 'scripts/check-site-links.ts'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify site freshness and links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck server source
        run: npm run typecheck
      - name: Regenerate machine-derived site regions
        run: npm run build:site
      - name: Fail if committed pages drifted from the source
        run: git diff --exit-code -- site
      - name: Check site links and anchors
        run: npm run check:site

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4

id: scope-assessment
version: 1.2.0
name: Scope Assessment
description: Confirm multi-work-package initiative and identify work packages to be planned
steps:
  - kind: action
    id: verify-preconditions
    actions:
      - action: validate
        target: agents_md_read
        message: AGENTS.md must be read before starting workflow
  - kind: technique
    id: assess-scope
    technique: assess-initiative-scope
  - kind: checkpoint
    id: scope-confirmed
    message: I've identified N work packages. Proceed with planning?
    options:
      - id: proceed
        label: Proceed with planning
        effect:
          transitionTo: folder-setup
      - id: refine
        label: Refine scope
        effect:
          transitionTo: scope-assessment
transitions:
  - to: folder-setup
    isDefault: true
outcome:
  - The workflow has an agreed inventory of distinct work packages to plan, so planning can proceed package-by-package
  - User and workflow share the same boundary for what this initiative covers, preventing scope drift downstream

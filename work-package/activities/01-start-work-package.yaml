id: start-work-package
version: 3.12.0
name: Start Work Package
description: Initialize the work package with issue, branch, draft PR, dedicated worktree, and planning folder.
required: true
steps:
  - kind: action
    id: announce-start
    actions:
      - action: log
        message: Starting issue management
  - kind: technique
    id: detect-review-mode
    technique: review-mode-detection
    condition:
      type: simple
      variable: is_review_mode
      operator: ==
      value: true
  - kind: checkpoint
    id: review-mode-detection
    condition:
      type: simple
      variable: is_review_mode
      operator: ==
      value: true
    message: This appears to be a review of an existing PR. Select whether to continue in review mode or treat this as new implementation.
    options:
      - id: confirm-review
        label: Yes, review existing PR
        description: Review an existing implementation
        effect:
          setVariable:
            is_review_mode: true
      - id: new-implementation
        label: No, new implementation
        description: This is new work, not a review
        effect:
          setVariable:
            is_review_mode: false
  - kind: technique
    id: capture-pr-reference
    technique: review-mode-detection
    condition:
      type: simple
      variable: is_review_mode
      operator: ==
      value: true
  - kind: checkpoint
    id: review-pr-reference
    condition:
      type: simple
      variable: is_review_mode
      operator: ==
      value: true
    message: "Please provide the PR to review (number or URL):"
    options:
      - id: pr-provided
        label: PR reference provided
        description: Proceed with the specified PR
        effect:
          setVariable:
            review_pr_captured: true
      - id: cancel-review
        label: Cancel review mode
        description: Switch to standard work package mode
        effect:
          setVariable:
            is_review_mode: false
  - kind: technique
    id: ingest-prior-feedback
    technique: review-existing-feedback
    condition:
      type: simple
      variable: is_review_mode
      operator: ==
      value: true
  - kind: technique
    id: resolve-reference
    technique: reference-resolution
  - kind: technique
    id: update-reference-submodules
    technique: manage-git::update-reference-submodules
    condition:
      type: simple
      variable: reference_path
      operator: exists
  - kind: technique
    id: analyze-reference-with-gitnexus
    technique:
      name: gitnexus-operations::analyze
      inputs:
        repo_path: reference_path
    actions:
      - action: set
        target: gitnexus_indexed
        value: true
  - kind: action
    id: verify-signing-precondition
    actions:
      - action: validate
        target: signing.configured == true
        message: Commit signing is not configured for this repository (user.signingkey, commit.gpgsign, or a working signing backend is missing). Configure git signing in your environment via your preferred scope (system, global, or local) before re-running.
  - kind: technique
    id: detect-merge-strategy
    technique: manage-git::detect-merge-strategy
  - kind: technique
    id: detect-project-type
    technique: project-type-detection
  - kind: technique
    id: check-issue
    technique: issue-reference-detection
  - kind: checkpoint
    id: issue-verification
    condition:
      type: and
      conditions:
        - type: simple
          variable: is_review_mode
          operator: "!="
          value: true
        - type: simple
          variable: issue_number
          operator: notExists
    message: No GitHub or Jira issue is associated with this work package. Select how to proceed.
    options:
      - id: provide-existing
        label: Provide existing issue
        description: "Share the issue number or URL (GitHub #N or Jira PROJ-N)"
        effect:
          setVariable:
            needs_issue_creation: false
      - id: create-issue
        label: Create new issue
        description: Create a new issue in GitHub or Jira
        effect:
          setVariable:
            needs_issue_creation: true
      - id: skip-issue
        label: Skip issue
        description: Proceed without (not recommended for non-trivial work)
        effect:
          setVariable:
            issue_skipped: true
  - kind: technique
    id: verify-jira-issue
    technique:
      name: atlassian-operations::get-jira-issue
      inputs:
        issueIdOrKey: "{issue_number}"
    condition:
      type: simple
      variable: issue_platform
      operator: ==
      value: jira
    actions:
      - action: validate
        target: jira_cloud_id != null
        message: Atlassian cloudId not set. Load the atlassian-operations technique and call getAccessibleAtlassianResources before any Jira tool. The cloudId is a runtime prerequisite for every Jira API call; this guard catches the failure mode where another step invokes a Jira tool without first loading atlassian-operations.
  - kind: technique
    id: verify-github-issue
    technique:
      name: github-cli-protocol::view-issue
      inputs:
        issue_identifier: "{issue_number}"
    condition:
      type: simple
      variable: issue_platform
      operator: ==
      value: github
  - kind: technique
    id: search-github-issue
    technique:
      name: github-cli-protocol::list-issues
      inputs:
        filters: --search '{jira_issue_key}' --json number,title,url --limit 5
    condition:
      type: simple
      variable: issue_platform
      operator: ==
      value: jira
    actions:
      - action: set
        target: github_issue_found
        description: true if a GitHub issue referencing jira_issue_key was found, false otherwise
      - action: set
        target: github_issue_number
        description: GitHub issue number if found, otherwise empty
  - kind: action
    id: check-github-issue
    when: issue_platform == 'jira' && github_issue_found == false
    actions: []
  - kind: checkpoint
    id: github-issue-missing
    condition:
      type: and
      conditions:
        - type: simple
          variable: issue_platform
          operator: ==
          value: jira
        - type: simple
          variable: github_issue_found
          operator: ==
          value: false
    message: No GitHub issue found for Jira ticket {jira_issue_key}. A linked GitHub issue enables PR traceability in the target repo. Select whether to create one.
    blocking: false
    defaultOption: create
    autoAdvanceMs: 30000
    options:
      - id: create
        label: Create GitHub issue
        description: Create a GitHub issue in the target repo mirroring the Jira ticket
        effect:
          setVariable:
            needs_github_issue_creation: true
      - id: skip
        label: Skip — use Jira ticket only
        description: Proceed without a GitHub issue
        effect:
          setVariable:
            needs_github_issue_creation: false
  - kind: technique
    id: create-github-issue-for-jira
    technique:
      name: create-issue
      inputs:
        issue_platform: github
    condition:
      type: simple
      variable: needs_github_issue_creation
      operator: ==
      value: true
  - kind: checkpoint
    id: jira-project-selection
    condition:
      type: simple
      variable: issue_platform
      operator: ==
      value: jira
    message: Select the Jira project for the new issue.
    options:
      - id: select
        label: Select from list
        description: Choose from available projects
        effect:
          setVariable:
            jira_project: selected
      - id: specify
        label: Specify project key
        description: Provide a specific project key
        effect:
          setVariable:
            jira_project: specified
  - kind: checkpoint
    id: issue-type-selection
    condition:
      type: simple
      variable: needs_issue_creation
      operator: ==
      value: true
    message: Select the issue type.
    options:
      - id: feature
        label: Feature / Story
        description: User-facing capability with clear value
        effect:
          setVariable:
            issue_type: feature
      - id: bug
        label: Bug
        description: Defect in existing functionality
        effect:
          setVariable:
            issue_type: bug
      - id: task
        label: Task
        description: Technical work not directly user-facing
        effect:
          setVariable:
            issue_type: task
      - id: enhancement
        label: Enhancement
        description: Improvement to existing functionality
        effect:
          setVariable:
            issue_type: enhancement
      - id: epic
        label: Epic (Jira only)
        description: Large feature spanning multiple stories/tasks
        effect:
          setVariable:
            issue_type: epic
  - kind: checkpoint
    id: issue-review
    condition:
      type: simple
      variable: needs_issue_creation
      operator: ==
      value: true
    message: Here is the drafted issue. Select whether to create it, edit it, or cancel.
    blocking: false
    defaultOption: create
    autoAdvanceMs: 30000
    options:
      - id: create
        label: Create issue
        description: Proceed to create the issue
        effect:
          setVariable:
            issue_approved: true
      - id: edit
        label: Edit issue
        description: Make changes before creating
        effect:
          setVariable:
            issue_approved: false
      - id: cancel
        label: Cancel issue creation
        description: Do not create the issue
        effect:
          setVariable:
            issue_cancelled: true
  - kind: technique
    id: create-issue
    technique: create-issue
    condition:
      type: simple
      variable: needs_issue_creation
      operator: ==
      value: true
  - kind: checkpoint
    id: platform-selection
    condition:
      type: simple
      variable: needs_issue_creation
      operator: ==
      value: true
    message: Select the platform for the new issue.
    options:
      - id: github
        label: GitHub
        description: Create issue in GitHub repository
        effect:
          setVariable:
            issue_platform: github
      - id: jira
        label: Jira
        description: Create issue in Jira project
        effect:
          setVariable:
            issue_platform: jira
  - kind: technique
    id: lookup-current-user
    technique: atlassian-operations::user-info
    when: issue_platform == 'jira' && issue_skipped != true
  - kind: technique
    id: assign-issue-jira
    technique:
      name: atlassian-operations::edit-jira-issue
      inputs:
        issueIdOrKey: "{issue_number}"
        fields: "{ assignee: { accountId: {accountId} } }"
    condition:
      type: and
      conditions:
        - type: simple
          variable: issue_skipped
          operator: "!="
          value: true
        - type: simple
          variable: issue_platform
          operator: ==
          value: jira
  - kind: technique
    id: transition-issue-jira
    technique:
      name: atlassian-operations::transition-jira-issue
      inputs:
        issueIdOrKey: "{issue_number}"
    condition:
      type: and
      conditions:
        - type: simple
          variable: issue_skipped
          operator: "!="
          value: true
        - type: simple
          variable: issue_platform
          operator: ==
          value: jira
  - kind: technique
    id: assign-issue-github
    technique:
      name: github-cli-protocol::assign-issue
      inputs:
        number: "{issue_number}"
        assignee: "@me"
    condition:
      type: and
      conditions:
        - type: simple
          variable: issue_skipped
          operator: "!="
          value: true
        - type: simple
          variable: issue_platform
          operator: ==
          value: github
  - kind: action
    id: bind-planning-folder-path
    actions:
      - action: set
        target: planning_folder_path
        message: Server-resolved canonical absolute planning folder from the get_workflow summary. Write location for ALL of this work package's artifacts.
  - kind: technique
    id: initialize-planning-folder
    technique: manage-artifacts::create-readme
  - kind: technique
    id: present-problem-overview
    technique:
      name: stakeholder-overview
      inputs:
        readme_section_heading: "## Problem Overview"
        source_material: issue details, ticket description, and any context gathered during this activity
    actions:
      - action: message
        message: "**Problem Overview** (plain-language summary for stakeholder reference)"
  - kind: technique
    id: derive-branch-name
    technique:
      name: naming-conventions
      inputs:
        issue_title: "{issue_title}"
    condition:
      type: simple
      variable: is_review_mode
      operator: "!="
      value: true
  - kind: technique
    id: compute-canonical-target-path
    technique: naming-conventions
  - kind: technique
    id: create-component-worktree
    technique: manage-git::create-worktree
    condition:
      type: simple
      variable: is_review_mode
      operator: "!="
      value: true
  - kind: technique
    id: create-review-worktree
    technique:
      name: manage-git::create-worktree
      inputs:
        create_branch: false
    condition:
      type: simple
      variable: is_review_mode
      operator: ==
      value: true
  - kind: technique
    id: check-branch
    technique: manage-git::verify-feature-branch
  - kind: technique
    id: check-pr
    technique:
      name: github-cli-protocol::list-prs
      inputs:
        filters: --head {branch_name} --json number,url --limit 1
    condition:
      type: simple
      variable: is_review_mode
      operator: "!="
      value: true
    actions:
      - action: set
        target: pr_exists
        description: true when list-prs returned a PR for the current branch head, false otherwise
      - action: set
        target: existing_pr_number
        description: PR number from the list-prs result when one was found
  - kind: checkpoint
    id: pr-check
    condition:
      type: simple
      variable: pr_exists
      operator: ==
      value: true
    message: "Found existing PR #{existing_pr_number} for this branch. Select whether to use it or create a new one."
    options:
      - id: use-existing
        label: Use existing PR
        description: Continue with the existing pull request
        effect:
          setVariable:
            use_existing_pr: true
            pr_number: "{existing_pr_number}"
      - id: create-new
        label: Create new PR
        description: Create a new draft pull request
        effect:
          setVariable:
            use_existing_pr: false
  - kind: technique
    id: create-pr
    technique:
      name: update-pr::create-pr
      inputs:
        issue_number: "{issue_number}"
        issue_platform: "{issue_platform}"
    condition:
      type: and
      conditions:
        - type: simple
          variable: is_review_mode
          operator: "!="
          value: true
        - type: simple
          variable: use_existing_pr
          operator: ==
          value: false
    actions:
      - action: set
        target: pr_exists
        value: true
        description: Mark PR as existing once successfully created.
  - kind: checkpoint
    id: pr-creation
    condition:
      type: and
      conditions:
        - type: simple
          variable: is_review_mode
          operator: "!="
          value: true
        - type: simple
          variable: issue_cancelled
          operator: "!="
          value: true
        - type: simple
          variable: use_existing_pr
          operator: "!="
          value: true
    message: Issue confirmed. Ready to create the feature branch and draft PR.
    blocking: false
    defaultOption: proceed
    autoAdvanceMs: 30000
    options:
      - id: proceed
        label: Create branch and PR
        description: Create feature branch and draft PR linked to issue
        effect:
          setVariable:
            pr_skipped: false
      - id: skip-pr
        label: Skip PR for now
        description: Continue without creating PR (can create later)
        effect:
          setVariable:
            pr_skipped: true
  - kind: technique
    id: link-pr-to-ticket-jira
    technique:
      name: atlassian-operations::comment-jira-issue
      inputs:
        issueIdOrKey: "{issue_number}"
        commentBody: "Pull Request: {pr_url}"
    condition:
      type: and
      conditions:
        - type: simple
          variable: is_review_mode
          operator: "!="
          value: true
        - type: simple
          variable: pr_number
          operator: exists
        - type: simple
          variable: issue_skipped
          operator: "!="
          value: true
        - type: simple
          variable: issue_platform
          operator: ==
          value: jira
  - kind: technique
    id: link-pr-to-ticket-github
    technique:
      name: github-cli-protocol::view-issue
      inputs:
        issue_identifier: "{issue_number}"
    condition:
      type: and
      conditions:
        - type: simple
          variable: is_review_mode
          operator: "!="
          value: true
        - type: simple
          variable: pr_number
          operator: exists
        - type: simple
          variable: issue_skipped
          operator: "!="
          value: true
        - type: simple
          variable: issue_platform
          operator: ==
          value: github
  - kind: action
    id: announce-completion
    actions:
      - action: log
        message: Issue management complete - issue verified/created, PR ready
transitions:
  - to: design-philosophy
    isDefault: true
outcome:
  - Issue exists or is created in appropriate platform
  - Issue transitioned to In Progress and assigned to current user
  - Feature branch created from main
  - Draft PR created, assigned to current GitHub user, and linked to issue
  - PR reference recorded on the issue via the platform's native PR linkage
  - A canonical, writable location is established for every artifact this work package will produce

id: validate
version: 3.6.0
name: Verify & Validate Design
description: Validate the implementation against tests, build, format, and lint checks when the local environment can run them.
required: true
steps:
  - kind: checkpoint
    id: local-validation-permission
    message: Is the local environment suitable to run the project's validation suite?
    blocking: true
    options:
      - id: run-locally
        label: Yes — run validation locally
        description: Agent executes the project suite in-process
        effect:
          setVariable:
            run_local_validation: true
            mark_progress_na: false
      - id: validation-unavailable
        label: No — mark validation N/A
        description: Skip the local suite; Progress Validation recorded as cancelled/N/A
        effect:
          setVariable:
            run_local_validation: false
            mark_progress_na: true
  - kind: technique
    id: preflight
    technique: cargo-operations::preflight
    when: project_type == 'rust-substrate' && run_local_validation == true
    actions:
      - action: validate
        target: missing_prerequisites.length == 0
        message: "Install missing toolchain prerequisites before validation: {missing_prerequisites}"
  - kind: technique
    id: run-suite
    technique:
      name: cargo-operations::run-suite
      inputs:
        build_scope: --workspace
    when: project_type == 'rust-substrate' && run_local_validation == true
  - kind: technique
    id: document-failures
    technique: findings-classification
    condition:
      type: simple
      variable: is_review_mode
      operator: ==
      value: true
  - kind: technique
    id: assess-test-coverage
    technique: review-test-suite
    condition:
      type: simple
      variable: is_review_mode
      operator: ==
      value: true
  - kind: technique
    id: triage-reported-failures
    technique: review-test-suite
    condition:
      type: simple
      variable: is_review_mode
      operator: ==
      value: true
  - kind: action
    id: fix-failures
    condition:
      type: and
      conditions:
        - type: simple
          variable: is_review_mode
          operator: "!="
          value: true
        - type: simple
          variable: run_local_validation
          operator: ==
          value: true
        - type: simple
          variable: validation_results.validation_passed
          operator: ==
          value: false
    actions: []
  - kind: loop
    id: fix-revalidate-cycle
    name: Fix and Revalidate Cycle
    loopType: doWhile
    condition:
      type: and
      conditions:
        - type: simple
          variable: run_local_validation
          operator: ==
          value: true
        - type: simple
          variable: validation_results.validation_passed
          operator: ==
          value: false
    maxIterations: 10
    steps:
      - kind: technique
        id: analyze-failure
        technique:
          name: validate-build::analyze-failure
          inputs:
            check_id: "{validation_results.first_failure.check_id}"
            failure_diagnostics: "{validation_results.first_failure.diagnostics}"
      - kind: technique
        id: apply-fix
        technique:
          name: validate-build::apply-fix
          inputs:
            check_id: "{validation_results.first_failure.check_id}"
      - kind: technique
        id: revalidate
        technique:
          name: cargo-operations::run-suite
          inputs:
            build_scope: --workspace
transitions:
  - to: strategic-review
    isDefault: true
outcome:
  - All tests passing when the suite ran locally, or Progress Validation marked cancelled/N/A when local validation was unavailable
  - Build successful when the agent ran the suite

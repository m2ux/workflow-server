id: implementation-analysis
version: 2.11.0
name: Implementation Analysis
description: Analyze the current implementation to understand effectiveness, establish baselines, and identify opportunities for improvement.
required: false
techniques:
  - scatter-gather
steps:
  - kind: technique
    id: review-baseline-state
    technique: review-baseline-state
    condition:
      type: simple
      variable: is_review_mode
      operator: ==
      value: true
  - kind: technique
    id: analyze-implementation
    technique: analyze
  - kind: technique
    id: collect-assumptions
    technique:
      name: review-assumptions::collect
      inputs:
        assumption_categories: Current Behavior, Gap Identification, Baseline Interpretation, Dependency Understanding
  - kind: technique
    id: document
    technique: document
  - kind: checkpoint
    id: analysis-confirmed
    message: Implementation analysis is complete. Select whether to confirm, clarify, or request more analysis.
    blocking: false
    defaultOption: confirmed
    autoAdvanceMs: 30000
    options:
      - id: confirmed
        label: Analysis confirmed
        description: Proceed to determine next steps
      - id: clarify
        label: Need clarification
        description: Some findings need discussion
      - id: more-analysis
        label: More analysis needed
        description: Additional areas need investigation
  - kind: technique
    id: update-assumptions-log
    technique: review-assumptions::record
  - kind: technique
    id: analyse-challenge-loop
    technique:
      name: analyse-challenge::run-loop
      inputs:
        concern_kind: assumptions
        analyse: review-assumptions::reconcile
        challenge_perspectives: '["stakeholder-gap", "rejected-paths", "evidence-strength"]'
        convergence_flag: has_resolvable_assumptions
        residue_flag: has_open_assumptions
        residue_collection: open_assumptions
  - kind: technique
    id: present-resolved-assumptions
    technique:
      name: review-assumptions::interview
      inputs:
        assembly_mode: batch
    actions:
      - action: message
        message: "**Assumptions** — analyse-challenge outcomes (resolved via analysis/challenge; residual opens listed when any remain)."
  - kind: checkpoint
    id: analysis-assumption-interview
    ref: assumption-interview
  - kind: technique
    id: record-batch-response
    technique: review-assumptions::record
    condition:
      type: and
      conditions:
        - type: simple
          variable: is_review_mode
          operator: "!="
          value: true
        - type: simple
          variable: has_open_assumptions
          operator: ==
          value: true
        - type: simple
          variable: needs_individual_interview
          operator: "!="
          value: true
  - kind: loop
    id: assumption-interview
    name: Individual Assumption Interview Loop
    loopType: forEach
    variable: current_assumption
    over: open_assumptions
    maxIterations: 20
    condition:
      type: and
      conditions:
        - type: simple
          variable: is_review_mode
          operator: "!="
          value: true
        - type: simple
          variable: needs_individual_interview
          operator: ==
          value: true
        - type: simple
          variable: has_open_assumptions
          operator: ==
          value: true
    steps:
      - kind: technique
        id: present-assumption
        technique:
          name: review-assumptions::interview
          inputs:
            assembly_mode: interview
      - kind: checkpoint
        id: analysis-assumption-decision#{current_assumption.id}
        message: "Assumption {current_assumption.id}: {current_assumption.statement}. Resolve now or defer."
        blocking: true
        options:
          - id: resolve-inline
            label: Resolve now
            description: Provide resolution for this assumption
            effect:
              setVariable:
                assumption_resolved_inline: true
          - id: defer-to-stakeholder
            label: Defer to stakeholder review
            description: Queue this assumption for stakeholder review
            effect:
              setVariable:
                assumption_deferred: true
                has_deferred_assumptions: true
      - kind: technique
        id: record-response
        technique: review-assumptions::record
transitions:
  - to: plan-prepare
    isDefault: true
outcome:
  - Current state documented with baseline metrics
  - Gaps identified and prioritized
  - Success criteria defined with measurement methodology

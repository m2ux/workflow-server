id: assumptions-review
version: 2.5.0
name: Assumptions Review
description: Converge open assumptions via analyse-challenge, then batch residual stakeholder judgements.
required: true
techniques:
  - scatter-gather
steps:
  - kind: technique
    id: evaluate-open-assumptions
    technique: review-assumptions::collect
  - kind: technique
    id: analyse-challenge-loop
    technique:
      name: analyse-challenge::run-loop
      inputs:
        concern_kind: assumptions
        analyse: review-assumptions::reconcile
        challenge_perspectives: '["stakeholder-gap", "rejected-paths", "evidence-strength"]'
        convergence_flag: has_resolvable_assumptions
        residue_flag: has_open_assumptions
        residue_collection: open_assumptions
  - kind: technique
    id: present-residual-assumptions
    technique:
      name: review-assumptions::interview
      inputs:
        assembly_mode: batch
    condition:
      type: and
      conditions:
        - type: simple
          variable: is_review_mode
          operator: "!="
          value: true
        - type: simple
          variable: has_open_assumptions
          operator: ==
          value: true
  - kind: checkpoint
    id: residual-assumption-batch
    ref: assumption-interview
  - kind: technique
    id: record-batch-decision
    technique: review-assumptions::record
    condition:
      type: and
      conditions:
        - type: simple
          variable: is_review_mode
          operator: "!="
          value: true
        - type: simple
          variable: has_open_assumptions
          operator: ==
          value: true
        - type: simple
          variable: needs_individual_interview
          operator: "!="
          value: true
  - kind: loop
    id: assumption-interview-loop
    name: Individual Assumption Interview Loop
    loopType: forEach
    variable: current_assumption
    over: open_assumptions
    condition:
      type: and
      conditions:
        - type: simple
          variable: is_review_mode
          operator: "!="
          value: true
        - type: simple
          variable: needs_individual_interview
          operator: ==
          value: true
        - type: simple
          variable: has_open_assumptions
          operator: ==
          value: true
    steps:
      - kind: technique
        id: present-assumption
        technique:
          name: review-assumptions::interview
          inputs:
            assembly_mode: interview
      - kind: checkpoint
        id: assumption-decision#{current_assumption.id}
        condition:
          type: simple
          variable: is_review_mode
          operator: "!="
          value: true
        message: "Assumption {current_assumption.id}: {current_assumption.statement}"
        blocking: true
        options:
          - id: accept
            label: Accept assumption
            description: This assumption is valid — proceed with it
            effect:
              setVariable:
                assumption_resolved_inline: true
          - id: reject
            label: Reject assumption
            description: This assumption is wrong — provide a correction
            effect:
              setVariable:
                assumption_resolved_inline: true
          - id: defer
            label: Defer
            description: Not enough information to decide now — revisit later
            effect:
              setVariable:
                assumption_deferred: true
                has_deferred_assumptions: true
      - kind: technique
        id: record-decision
        technique: review-assumptions::record
  - kind: technique
    id: update-assumptions-log
    technique: review-assumptions::record
  - kind: technique
    id: post-summary-jira
    technique: atlassian-operations::comment-jira-issue
    condition:
      type: and
      conditions:
        - type: simple
          variable: stealth_mode
          operator: "!="
          value: true
        - type: simple
          variable: is_review_mode
          operator: "!="
          value: true
        - type: simple
          variable: issue_platform
          operator: ==
          value: jira
        - type: simple
          variable: has_deferred_assumptions
          operator: ==
          value: true
        - type: simple
          variable: post_jira_comment
          operator: "!="
          value: false
  - kind: checkpoint
    id: post-summary-review
    condition:
      type: and
      conditions:
        - type: simple
          variable: stealth_mode
          operator: "!="
          value: true
        - type: simple
          variable: is_review_mode
          operator: "!="
          value: true
        - type: simple
          variable: issue_platform
          operator: exists
        - type: simple
          variable: has_deferred_assumptions
          operator: ==
          value: true
    message: Some assumptions were deferred and need external stakeholder attention. Select whether to post the summary to {issue_platform}.
    blocking: false
    defaultOption: post-summary
    autoAdvanceMs: 30000
    options:
      - id: post-summary
        label: Post summary to issue tracker
        description: Post the resolution summary
      - id: skip-posting
        label: Skip posting
        description: Do not post to issue tracker
        effect:
          setVariable:
            post_jira_comment: false
  - kind: technique
    id: post-summary-github
    technique: github-cli-protocol::comment-issue
    condition:
      type: and
      conditions:
        - type: simple
          variable: stealth_mode
          operator: "!="
          value: true
        - type: simple
          variable: is_review_mode
          operator: "!="
          value: true
        - type: simple
          variable: issue_platform
          operator: ==
          value: github
        - type: simple
          variable: has_deferred_assumptions
          operator: ==
          value: true
transitions:
  - to: codebase-comprehension
    condition:
      type: simple
      variable: needs_comprehension
      operator: ==
      value: true
  - to: plan-prepare
    condition:
      type: simple
      variable: needs_plan_revision
      operator: ==
      value: true
  - to: assumptions-review
    condition:
      type: simple
      variable: needs_further_discussion
      operator: ==
      value: true
  - to: lean-coding-audit
    condition:
      type: simple
      variable: is_review_mode
      operator: ==
      value: true
  - to: implement
    isDefault: true
outcome:
  - Open assumptions converged through analyse-challenge before any residual ask
  - Residual stakeholder judgements batched (or individually reviewed only when requested)
  - Implementation can proceed on a vetted set of assumption decisions, with any deferred items explicitly tracked
  - External stakeholders are notified of deferred assumptions that need their attention

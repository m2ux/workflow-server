id: complete
version: 1.6.1
name: Complete Work Package
description: Wrap up the work package after PR merge.
required: true
steps:
  - kind: technique
    id: create-adr
    technique: create-adr
    condition:
      type: and
      conditions:
        - type: simple
          variable: is_review_mode
          operator: "!="
          value: true
        - type: or
          conditions:
            - type: simple
              variable: problem_complexity
              operator: ==
              value: moderate
            - type: simple
              variable: problem_complexity
              operator: ==
              value: complex
  - kind: technique
    id: update-adr-status
    technique: finalize-documentation::update-adr
    condition:
      type: and
      conditions:
        - type: simple
          variable: is_review_mode
          operator: "!="
          value: true
        - type: or
          conditions:
            - type: simple
              variable: problem_complexity
              operator: ==
              value: moderate
            - type: simple
              variable: problem_complexity
              operator: ==
              value: complex
  - kind: technique
    id: finalize-test-plan
    technique: finalize-documentation::finalize-test-plan
    condition:
      type: simple
      variable: is_review_mode
      operator: "!="
      value: true
  - kind: technique
    id: create-complete-doc
    technique: finalize-documentation::create-complete-doc
    condition:
      type: simple
      variable: is_review_mode
      operator: "!="
      value: true
  - kind: technique
    id: render-token-usage
    technique: finalize-documentation::render-token-usage
    condition:
      type: simple
      variable: is_review_mode
      operator: "!="
      value: true
  - kind: technique
    id: ensure-docs
    technique: finalize-documentation::ensure-docs
    condition:
      type: simple
      variable: is_review_mode
      operator: "!="
      value: true
  - kind: technique
    id: conduct-retrospective
    technique: conduct-retrospective::retrospective
  - kind: checkpoint
    id: retrospective-confirm
    message: "Retrospective interview complete for this item set."
    blocking: false
    defaultOption: confirmed
    autoAdvanceMs: 30000
    options:
      - id: confirmed
        label: Confirmed — continue
        description: Retrospective items reviewed one at a time; proceed.
      - id: revise
        label: Revisit an item
        description: Return to a retrospective observation or recommendation before continuing.
  - kind: technique
    id: remove-worktree
    technique: manage-git::remove-worktree
    condition:
      type: simple
      variable: worktree_created
      operator: ==
      value: true
  - kind: technique
    id: select-next
    technique: conduct-retrospective::select-next
  - kind: action
    id: announce-completion
    actions:
      - action: log
        message: Work package workflow complete
outcome:
  - The key design decision is durably recorded for future reference when complexity is moderate or complex
  - Project documentation reflects the delivered change
  - Lessons learned are captured to improve future work packages
  - The temporary worktree this work package created is cleaned up, leaving no orphaned workspaces
  - Reference monorepo left untouched
  - Ready for next work package

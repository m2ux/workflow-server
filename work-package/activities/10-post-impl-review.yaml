id: post-impl-review
version: 1.17.1
name: Post-Implementation Review
description: Review implementation quality before validation.
required: true
steps:
  - kind: action
    id: announce-start
    actions:
      - action: log
        message: Starting post-implementation review
  - kind: technique
    id: gitnexus-detect-changes-preflight
    technique: gitnexus-operations::detect-changes
    when: gitnexus_indexed == true
  - kind: technique
    id: manual-diff-review
    technique: review-diff
  - kind: checkpoint
    id: file-index-table
    message: "File index: [change block index]({change_block_index}), one rationale paragraph per change block. Review the diff in your side-by-side app, then reply with the row numbers of any blocks with issues (e.g. '24, 31') or 'none', plus any rationale corrections. Your confirmation is the provenance attestation for each change."
    blocking: false
    defaultOption: rationale-confirmed
    autoAdvanceMs: 30000
    options:
      - id: rationale-confirmed
        label: Rationale confirmed — no issues
        description: Agent rationale paragraphs are accurate. All changes understood. Proceed with automated reviews.
      - id: rationale-confirmed-with-issues
        label: Rationale confirmed (with corrections) — issues found
        description: Provide rationale corrections and comma-separated block indices with issues
        effect:
          setVariable:
            has_flagged_blocks: true
      - id: has-issues
        label: Issues found — rationale not yet reviewed
        description: Enter comma-separated list of block indices with issues; rationale review deferred
        effect:
          setVariable:
            has_flagged_blocks: true
  - kind: checkpoint
    id: block-interview
    condition:
      type: simple
      variable: has_flagged_blocks
      operator: ==
      value: true
    message: "Reviewing block {current_block_index}: {block_path}:{block_line_range}. What's the issue with this change?"
    blocking: false
    defaultOption: issue-recorded
    autoAdvanceMs: 30000
    options:
      - id: issue-recorded
        label: Issue recorded - continue
        description: Move to next flagged block
      - id: critical-blocker
        label: This is a critical blocker
        description: Mark as blocking issue that must be fixed
        effect:
          setVariable:
            has_critical_blocker: true
      - id: skip-block
        label: Skip this block
        description: No longer an issue, move to next
  - kind: technique
    id: code-review
    technique: review-code
  - kind: technique
    id: structural-analysis-inline
    technique:
      name: prism/structural-analysis
      inputs:
        findings_destination: code-review.md
    condition:
      type: not
      condition:
        type: simple
        variable: problem_complexity
        operator: ==
        value: complex
  - kind: action
    id: dispatch-prism
    condition:
      type: simple
      variable: problem_complexity
      operator: ==
      value: complex
    actions: []
  - kind: technique
    id: test-suite-review
    technique: review-test-suite
  - kind: loop
    id: review-fix-cycle
    name: Review-Fix Cycle
    loopType: doWhile
    condition:
      type: or
      conditions:
        - type: simple
          variable: needs_code_fixes
          operator: ==
          value: true
        - type: simple
          variable: needs_test_improvements
          operator: ==
          value: true
    maxIterations: 3
    steps:
      - kind: technique
        id: apply-fixes
        technique: apply-review-fixes
      - kind: action
        id: reset-fix-flags
        actions:
          - action: set
            target: needs_code_fixes
            value: false
          - action: set
            target: needs_test_improvements
            value: false
      - kind: technique
        id: re-manual-diff-review
        technique: review-diff
      - kind: technique
        id: re-code-review
        technique: review-code
      - kind: technique
        id: re-test-suite-review
        technique: review-test-suite
  - kind: technique
    id: architecture-summary
    technique: summarize-architecture
    required: false
    condition:
      type: simple
      variable: skip_architecture_summary
      operator: "!="
      value: true
  - kind: technique
    id: classify-and-route-findings
    technique: findings-classification
decisions:
  - id: blocker-gate
    name: Critical Blocker Gate
    branches:
      - id: has-blocker
        label: Critical blocker found — return to implement
        condition:
          type: simple
          variable: has_critical_blocker
          operator: ==
          value: true
        transitionTo: implement
      - id: no-blocker
        label: No critical blockers — proceed to validate
        isDefault: true
transitions:
  - to: validate
    isDefault: true
outcome:
  - Every change block has a confirmed rationale and provenance attestation, so reviewers can trust each change is understood and intentional
  - Code-level defects and risks are surfaced and triaged before validation
  - Structural risks across the change set are identified for triage
  - Test coverage gaps are surfaced so they can be closed before validation
  - A stakeholder-readable architecture overview is available when the change warrants one

id: design-philosophy
version: 1.12.0
name: Design Philosophy
description: Apply the design framework to classify the problem and decide the workflow path.
required: true
techniques:
  - scatter-gather
steps:
  - kind: technique
    id: define-problem
    technique: define
  - kind: technique
    id: classify-problem
    technique: classify
  - kind: technique
    id: determine-path
    technique: determine-path
  - kind: checkpoint
    id: classification-and-path-confirmed
    condition:
      type: simple
      variable: is_review_mode
      operator: "!="
      value: true
    message: "Classification: {problem_type} with {problem_complexity} complexity. Confirm the recommended path (default below), pick a different path, or revise if the classification itself is wrong."
    blocking: false
    defaultOption: skip-optional
    autoAdvanceMs: 30000
    options:
      - id: revise-classification
        label: Revise classification
        description: The problem type or complexity assessment needs adjustment before a path is chosen
      - id: full-workflow
        label: Full workflow (elicitation + research)
        description: Complex feature requiring requirements discovery and research
        effect:
          setVariable:
            problem_complexity: complex
            needs_elicitation: true
            needs_research: true
            skip_optional_activities: false
      - id: elicitation-only
        label: Elicitation only (skip research)
        description: Requirements unclear but domain is well-understood
        effect:
          setVariable:
            problem_complexity: moderate
            needs_elicitation: true
            needs_research: false
            skip_optional_activities: false
      - id: research-only
        label: Research only (skip elicitation)
        description: Requirements clear but need to research best practices
        effect:
          setVariable:
            problem_complexity: moderate
            needs_elicitation: false
            needs_research: true
            skip_optional_activities: false
      - id: skip-optional
        label: Skip optional activities
        description: Well-defined issue — no additional discovery needed
        effect:
          setVariable:
            problem_complexity: simple
            needs_elicitation: false
            needs_research: false
            skip_optional_activities: true
  - kind: technique
    id: document-philosophy
    technique: document
    actions:
      - action: message
        message: Design philosophy recorded for reference.
  - kind: technique
    id: collect-assumptions
    technique:
      name: review-assumptions::collect
      inputs:
        activity_context: design-philosophy
        assumption_categories: Problem Interpretation, Complexity Assessment, Workflow Path
  - kind: technique
    id: create-assumptions-log
    technique:
      name: review-assumptions::record
      inputs:
        activity_context: design-philosophy
        assumption_categories: Problem Interpretation, Complexity Assessment, Workflow Path
  - kind: technique
    id: analyse-challenge-loop
    technique:
      name: analyse-challenge::run-loop
      inputs:
        concern_kind: assumptions
        analyse: review-assumptions::reconcile
        challenge_perspectives: '["stakeholder-gap", "rejected-paths", "evidence-strength"]'
        convergence_flag: has_resolvable_assumptions
        residue_flag: has_open_assumptions
        residue_collection: open_assumptions
  - kind: technique
    id: assess-ticket-completeness
    technique: assess-ticket-completeness
    condition:
      type: simple
      variable: is_review_mode
      operator: ==
      value: true
  - kind: checkpoint
    id: ticket-completeness
    condition:
      type: simple
      variable: is_review_mode
      operator: ==
      value: true
    message: Ticket completeness gaps were identified. Select whether to refactor the ticket or proceed with gaps noted.
    blocking: false
    defaultOption: proceed-with-gaps
    autoAdvanceMs: 30000
    options:
      - id: refactor-ticket
        label: Refactor ticket
        description: Update the ticket to address identified gaps
        effect:
          setVariable:
            ticket_refactor_needed: true
      - id: proceed-with-gaps
        label: Proceed with gaps noted
        description: Document gaps in the [assumptions log]({assumptions_log}) and continue review with gaps as tracked findings
        effect:
          setVariable:
            ticket_refactor_needed: false
            ticket_gaps_documented: true
      - id: no-gaps
        label: Ticket is complete
        description: No significant gaps were found
        effect:
          setVariable:
            ticket_refactor_needed: false
  - kind: action
    id: set-review-mode-path
    condition:
      type: simple
      variable: is_review_mode
      operator: ==
      value: true
    actions:
      - action: set
        target: needs_elicitation
        value: false
      - action: message
        message: "Review mode: classification recorded ({problem_type}, {problem_complexity} complexity)."
transitions:
  - to: codebase-comprehension
    isDefault: true
outcome:
  - Problem clearly defined and classified
  - Complexity assessed
  - Workflow path determined
  - A durable record of the classification and path rationale that downstream activities and reviewers can rely on

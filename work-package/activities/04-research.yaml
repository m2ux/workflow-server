id: research
version: 2.12.0
name: Research
description: Research the knowledge base and external sources to discover best practices, patterns, and resources to inform the plan-prepare activity.
required: false
steps:
  - kind: technique
    id: research-knowledge-base
    technique: research
  - kind: technique
    id: synthesize
    technique: synthesize
  - kind: technique
    id: triage-research-candidates
    technique: triage
  - kind: loop
    id: research-reconciliation
    name: Research Reconciliation Loop
    loopType: doWhile
    condition:
      type: simple
      variable: has_reconcilable_research
      operator: ==
      value: true
    maxIterations: 10
    steps:
      - kind: technique
        id: reconcile-research-candidates
        technique: reconcile
        when: has_reconcilable_research == true
      - kind: checkpoint
        id: research-convergence
        condition:
          type: simple
          variable: has_reconcilable_research
          operator: ==
          value: false
        message: "Research has converged. Full candidate inventory ([Open Research Candidates]({research_document})): {research_candidates}. Every research-reconcilable candidate was resolved; only irreconcilable items — or none — remain, each with its rationale and handoff target. Select whether to accept research and proceed to planning, or direct further research on a specific item."
        blocking: false
        defaultOption: accept-research
        autoAdvanceMs: 30000
        options:
          - id: accept-research
            label: Accept — proceed to planning
            description: Research is complete; remaining open candidates are irreconcilable by research and are carried to their handoff targets (stakeholder interview, assumption reconciliation, or recorded out-of-scope).
          - id: request-more
            label: Direct further research
            description: Reopen the loop to research a named candidate further — provide the focus in your response; the next pass incorporates it.
            effect:
              setVariable:
                has_reconcilable_research: true
  - kind: technique
    id: collect-assumptions
    technique:
      name: review-assumptions::collect
      inputs:
        assumption_categories: Pattern Applicability, Source Relevance, Synthesis Decisions, Risk Assessment
  - kind: technique
    id: document
    technique: document
  - kind: technique
    id: update-assumptions-log
    technique: review-assumptions::record
  - kind: technique
    id: reconcile-assumptions
    technique: review-assumptions::reconcile
  - kind: loop
    id: assumption-reconciliation
    name: Assumption Reconciliation Loop
    loopType: while
    condition:
      type: simple
      variable: has_resolvable_assumptions
      operator: ==
      value: true
    steps:
      - kind: technique
        id: reconcile-iteration
        technique: review-assumptions::reconcile
  - kind: technique
    id: present-resolved-assumptions
    technique: review-assumptions::interview
    actions:
      - action: message
        message: "**Resolved Assumptions** — the following assumptions were resolved through code analysis."
  - kind: action
    id: derive-context-scope
    actions:
      - action: set
        target: context_scope
        description: "From research run evidence — repo-only when no external web sources informed design; web-retrieval when only web did; mixed when both repository/kb and web did. Leave prior/default when evidence is insufficient and set context_scope_uncertain instead."
      - action: set
        target: context_scope_uncertain
        description: true only when run evidence cannot decide among repo-only / web-retrieval / mixed; false when context_scope was derived confidently
  - kind: action
    id: announce-derived-context-scope
    condition:
      type: simple
      variable: context_scope_uncertain
      operator: "!="
      value: true
    actions:
      - action: message
        message: "Research context scope derived as `{context_scope}`."
  - kind: checkpoint
    id: context-scope-declaration
    condition:
      type: simple
      variable: context_scope_uncertain
      operator: ==
      value: true
    message: Research context scope could not be derived from run evidence. Declare whether research used repository only, external web sources, or both.
    blocking: false
    defaultOption: repo-only
    autoAdvanceMs: 15000
    options:
      - id: repo-only
        label: Repository only — no external web sources used
        description: All research was based on codebase and local knowledge (default)
        effect:
          setVariable:
            context_scope: repo-only
            context_scope_uncertain: false
      - id: web-retrieval
        label: External web sources used for design decisions
        description: Web search, external docs, or third-party references informed the approach
        effect:
          setVariable:
            context_scope: web-retrieval
            context_scope_uncertain: false
      - id: mixed
        label: Both repository and external sources used
        description: Mix of codebase analysis and external references
        effect:
          setVariable:
            context_scope: mixed
            context_scope_uncertain: false
  - kind: technique
    id: interview-open-assumptions
    technique: review-assumptions::interview
  - kind: loop
    id: assumption-interview
    name: Assumption Interview Loop
    loopType: forEach
    variable: current_assumption
    over: open_assumptions
    maxIterations: 20
    steps:
      - kind: technique
        id: present-assumption
        technique: review-assumptions::interview
      - kind: checkpoint
        id: research-assumption-interview
        ref: assumption-interview
      - kind: technique
        id: record-response
        technique: review-assumptions::record
transitions:
  - to: implementation-analysis
    isDefault: true
outcome:
  - Best practices identified from multiple sources
  - Patterns validated and mapped to requirements
  - Risks and anti-patterns documented

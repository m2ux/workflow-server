id: codebase-comprehension
version: 1.9.0
name: Codebase Comprehension
description: Build or augment a mental model of the codebase.
required: false
techniques:
  - scatter-gather
steps:
  - kind: technique
    id: build-comprehension
    technique: survey
  - kind: technique
    id: create-comprehension-artifact
    technique: manage-artifacts::write-artifact
    actions:
      - action: message
        message: Comprehension artifact recorded for reference.
  - kind: technique
    id: initial-deep-dive
    technique: deep-dive
  - kind: technique
    id: update-artifact-initial
    technique: manage-artifacts::write-artifact
  - kind: technique
    id: revise-initial-questions
    technique: revise-questions
  - kind: loop
    id: deep-dive-iteration
    name: Deep-Dive Iteration
    loopType: while
    condition:
      type: simple
      variable: needs_comprehension
      operator: ==
      value: true
    steps:
      - kind: technique
        id: analyse-challenge-pass
        technique:
          name: analyse-challenge::run-loop
          inputs:
            concern_kind: open_questions
            analyse: codebase-comprehension::deep-dive
            challenge_perspectives: '["pedagogy", "rejected-paths"]'
            convergence_flag: needs_comprehension
            residue_flag: has_open_questions
            iteration_mode: once
      - kind: technique
        id: update-artifact
        technique: manage-artifacts::write-artifact
      - kind: checkpoint
        id: comprehension-sufficient
        condition:
          type: simple
          variable: has_open_questions
          operator: ==
          value: true
        message: Open questions remain after analyse-challenge (see above). Select whether understanding is sufficient or further exploration is needed.
        blocking: false
        defaultOption: sufficient
        autoAdvanceMs: 30000
        options:
          - id: sufficient
            label: Understanding sufficient
            description: Accept remaining gaps and proceed
            effect:
              setVariable:
                needs_comprehension: false
          - id: dive-deeper
            label: Dive deeper
            description: Investigate remaining open questions in more detail
            effect:
              setVariable:
                needs_comprehension: true
          - id: different-area
            label: Explore a different area
            description: Shift focus to a different part of the codebase
            effect:
              setVariable:
                needs_comprehension: true
transitions:
  - to: requirements-elicitation
    condition:
      type: simple
      variable: needs_elicitation
      operator: ==
      value: true
  - to: research
    condition:
      type: and
      conditions:
        - type: simple
          variable: needs_elicitation
          operator: ==
          value: false
        - type: simple
          variable: needs_research
          operator: ==
          value: true
  - to: plan-prepare
    condition:
      type: simple
      variable: skip_optional_activities
      operator: ==
      value: true
  - to: implementation-analysis
    isDefault: true
outcome:
  - Mental model of codebase architecture established
  - Key abstractions and design rationale documented
  - Domain concepts mapped to technical constructs
  - A reusable comprehension reference exists that future work can build on without re-investigating the same area
  - Open questions converged via analyse-challenge before the soft sufficiency gate

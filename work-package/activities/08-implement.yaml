id: implement
version: 2.11.0
name: Implement Tasks
description: Execute the implementation plan task by task.
required: true
techniques:
  - scatter-gather
steps:
  - kind: action
    id: verify-preconditions
    actions:
      - action: validate
        target: branch
        message: Verify on correct feature branch before any code changes
  - kind: loop
    id: task-cycle
    name: Task Implementation Cycle
    loopType: forEach
    variable: current_task
    over: implementation_plan.tasks
    steps:
      - kind: technique
        id: implement-task
        technique: implement-task
      - kind: technique
        id: run-tests
        technique:
          name: cargo-operations::test
          inputs:
            build_scope: -p {current_task.crate}
      - kind: technique
        id: commit
        technique: manage-git::artifact-commits
      - kind: technique
        id: log-provenance
        technique: dco-provenance::append-task-row
      - kind: technique
        id: self-review
        technique: task-completion-review
      - kind: checkpoint
        id: symbol-provenance-confirmed
        condition:
          type: simple
          variable: has_uncertain_symbols
          operator: ==
          value: true
        message: |-
          One or more symbols in this task could not be confirmed against the codebase or declared dependencies:

          {uncertain_symbols}

          Investigate before proceeding, or confirm they were introduced intentionally by this task.
        blocking: true
        options:
          - id: confirmed
            label: Symbols are intentional — proceed
            description: The flagged symbols were introduced intentionally by this task or were verified manually; continue.
          - id: uncertain
            label: Investigate before proceeding
            description: Pause the loop and investigate symbol provenance before continuing.
      - kind: technique
        id: collect-assumptions
        technique: review-assumptions::collect
  - kind: technique
    id: analyse-challenge-loop
    technique:
      name: analyse-challenge::run-loop
      inputs:
        concern_kind: assumptions
        analyse: review-assumptions::reconcile
        challenge_perspectives: '["stakeholder-gap", "rejected-paths", "evidence-strength"]'
        convergence_flag: has_resolvable_assumptions
        residue_flag: has_open_assumptions
        residue_collection: open_assumptions
  - kind: technique
    id: present-resolved-assumptions
    technique:
      name: review-assumptions::interview
      inputs:
        assembly_mode: batch
    actions:
      - action: message
        message: "**Assumptions** — analyse-challenge outcomes for implementation (residual opens listed when any remain)."
  - kind: checkpoint
    id: implementation-assumption-interview
    ref: assumption-interview
  - kind: technique
    id: record-batch-response
    technique: review-assumptions::record
    condition:
      type: and
      conditions:
        - type: simple
          variable: has_open_assumptions
          operator: ==
          value: true
        - type: simple
          variable: needs_individual_interview
          operator: "!="
          value: true
  - kind: loop
    id: assumption-interview
    name: Individual Assumption Interview Loop
    loopType: forEach
    variable: current_assumption
    over: open_assumptions
    maxIterations: 20
    condition:
      type: and
      conditions:
        - type: simple
          variable: needs_individual_interview
          operator: ==
          value: true
        - type: simple
          variable: has_open_assumptions
          operator: ==
          value: true
    steps:
      - kind: technique
        id: present-assumption
        technique:
          name: review-assumptions::interview
          inputs:
            assembly_mode: interview
      - kind: checkpoint
        id: implementation-assumption-decision#{current_assumption.id}
        message: "Assumption {current_assumption.id}: {current_assumption.statement}. Resolve now or defer."
        blocking: true
        options:
          - id: resolve-inline
            label: Resolve now
            description: Provide resolution for this assumption
            effect:
              setVariable:
                assumption_resolved_inline: true
          - id: defer-to-stakeholder
            label: Defer to stakeholder review
            description: Queue this assumption for stakeholder review
            effect:
              setVariable:
                assumption_deferred: true
                has_deferred_assumptions: true
      - kind: technique
        id: record-response
        technique: review-assumptions::record
  - kind: technique
    id: update-assumptions-log
    technique: review-assumptions::record
transitions:
  - to: lean-coding-audit
    isDefault: true
outcome:
  - All tasks implemented
  - The implemented work is captured as reviewable, attributable commits on the feature branch
  - An auditable per-task record of what changed and why exists to support the later DCO attestation

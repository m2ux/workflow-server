$schema: ../../schemas/workflow.schema.json
id: remediate-vuln
version: 2.0.0
title: Security Vulnerability Remediation Workflow
description: Remediate security vulnerabilities without public disclosure.
author: m2ux
tags:
  - security
  - implementation
  - vulnerability
  - remediation
  - private
rules:
  workflow:
    - "Agents MUST NOT skip or auto-resolve blocking checkpoints (blocking: true) — these require explicit user selection."
    - ref: work-package::interaction-discipline
    - Explicit approval - Get clear 'yes' or 'proceed' before major actions
    - "ORCHESTRATION MODEL: This workflow uses an orchestrator/worker pattern. The agent receiving the user request acts AS the orchestrator inline (technique: meta-orchestrator from meta/techniques) — it MUST NOT be spawned as a sub-agent. The orchestrator loads the workflow, manages transitions, tracks state, and presents checkpoints to the user. A worker sub-agent (technique: activity-worker from meta/techniques) executes activity steps and produces artifacts. When the worker reaches a blocking checkpoint, it yields a checkpoint_pending result. The orchestrator presents the checkpoint to the user, then resumes the worker with the response. CONSTRAINT: Only ONE level of sub-agent indirection (the worker)."
  activity:
    - "STRICT ISOLATION: The agent MUST NOT use any public GitHub tools (e.g. gh pr create, gh issue create) during this workflow."
    - "PRIVATE REMOTE ONLY: All git operations must target the 'security' remote, never 'origin'."
    - "PRIVATE RESEARCH ONLY: Outbound research and web queries MUST NOT contain advisory-identifying strings (CVE identifiers, advisory URLs, vulnerable symbol or project names). Research generically, or against local sources only."
techniques:
  activity:
    - variable-binding
variables:
  - name: target_path
    type: string
    description: Path to the private checkout where edits, branch creation, builds, and pushes happen. All git operations run inside this directory; every push targets the 'security' remote. Resolved during start.
  - name: reference_path
    type: string
    description: Path used for codebase comprehension and code-resolvable assumption analysis by the shared work-package activities. In this workflow the fix develops directly in the private checkout, so start's resolve-reference step sets it to target_path.
  - name: component_name
    type: string
    description: Basename of the component under remediation, derived from target_path by start's resolve-reference step. Read by shared activities that name the component in artifacts and messages.
    defaultValue: ""
  - name: planning_folder_path
    type: string
    description: "Path to planning folder: .engineering/artifacts/planning/YYYY-MM-DD-{work-package-name}"
  - name: provenance_log_path
    type: string
    description: Absolute path to the AI-assistance provenance log (provenance-log.md) under the planning folder, appended to during implement and read by submit's DCO attestation.
    defaultValue: ""
  - name: branch_name
    type: string
    description: Security feature branch name (e.g. vuln/remediate-{short_id}), created off the private fork.
  - name: project_type
    type: string
    description: Detected project type (e.g. rust-substrate); produced by start's detect-project-type step and gates the rust-substrate validation suite in validate.
  - name: stealth_mode
    type: boolean
    description: Structural no-disclosure gate consumed by shared work-package activities — suppresses PR rendering/creation and issue-tracker posting. Always true for this workflow (seeded at session creation and re-asserted by start's set-security-mode step).
    defaultValue: true
  - name: sec_vuln_url
    type: string
    description: URL of the vulnerability advisory to remediate, behind restricted access.
  - name: private_fork_url
    type: string
    description: URL of the private fork that backs the 'security' git remote.
  - name: short_id
    type: string
    description: Short slug identifying the advisory, used to form the security branch name.
  - name: is_review_mode
    type: boolean
    description: Always false for this workflow — the shared work-package activities' review-mode steps and checkpoints gate out.
    defaultValue: false
  - name: needs_elicitation
    type: boolean
    description: Whether requirements elicitation is needed. Set by design-philosophy's path checkpoint.
    defaultValue: false
  - name: needs_research
    type: boolean
    description: Whether the research phase is needed. Set by design-philosophy's path checkpoint.
    defaultValue: false
  - name: skip_optional_activities
    type: boolean
    description: Whether to skip optional discovery activities (elicitation and research). Set by design-philosophy's path checkpoint.
    defaultValue: false
  - name: needs_comprehension
    type: boolean
    description: Whether codebase comprehension is needed. Always true after design-philosophy; may be re-set by assumptions-review when stakeholder feedback requires deeper understanding.
    defaultValue: true
  - name: problem_complexity
    type: string
    description: Problem complexity assessed during design-philosophy (simple|moderate|complex).
  - name: problem_type
    type: string
    description: Problem classification set during design-philosophy (e.g. defect, inventive-improvement); interpolated into its path-confirmation checkpoint message.
  - name: path_gating_complexity
    type: string
    description: Path-gating mirror of problem_complexity, set by design-philosophy's skip-optional checkpoint effect.
    defaultValue: ""
  - name: elicitation_complete
    type: boolean
    description: Whether requirements elicitation is finished.
    defaultValue: false
  - name: question_domains
    type: array
    description: Question domains iterated by the requirements-elicitation loop.
  - name: current_domain
    type: string
    description: Current question domain during the elicitation loop (from question_domains).
  - name: research_candidates
    type: array
    description: "Inventory of open research gaps surfaced after synthesis, each triaged as reconcilable-by-research or irreconcilable. Drives the research reconciliation loop. Sub-shape per entry: { id, statement, status, rationale, handoff }."
  - name: has_reconcilable_research
    type: boolean
    description: Whether open research-reconcilable candidates remain; drives the research reconciliation loop.
    defaultValue: false
  - name: context_scope
    type: string
    description: "Provenance scope of AI-generated code (repo-only|web-retrieval|mixed), set during research and recorded in the provenance log. Web retrieval is additionally constrained by the PRIVATE RESEARCH ONLY rule."
    defaultValue: repo-only
  - name: has_open_questions
    type: boolean
    description: Whether unresolved open questions remain after the codebase comprehension deep-dive.
    defaultValue: false
  - name: comprehension_artifact
    type: string
    description: Absolute path to the comprehension artifact for the current codebase area.
    defaultValue: ""
  - name: artifact_name
    type: string
    description: Filename of the comprehension artifact (basename only) used in user-facing messages.
    defaultValue: ""
  - name: task_assumptions
    type: array
    description: Assumptions collected during the current task for review iteration.
  - name: has_resolvable_assumptions
    type: boolean
    description: Whether code-resolvable assumptions exist that targeted analysis can validate; drives the assumption reconciliation loops in shared activities.
    defaultValue: false
  - name: has_open_assumptions
    type: boolean
    description: Whether unresolved assumptions remain after reconciliation that require user input; gates the assumption interview.
    defaultValue: false
  - name: open_assumptions
    type: array
    description: Open assumptions iterated by the assumption interview loops.
  - name: current_assumption
    type: object
    description: "Current assumption during the interview loop (from open_assumptions). Sub-shape: { id, statement }."
  - name: assumption_resolved_inline
    type: boolean
    description: Whether the current assumption was resolved inline at the interview checkpoint.
    defaultValue: false
  - name: assumption_deferred
    type: boolean
    description: Whether the current assumption was deferred at the interview checkpoint.
    defaultValue: false
  - name: has_deferred_assumptions
    type: boolean
    description: Whether any assumptions were deferred during review. Issue-tracker posting of deferred summaries is disclosure-gated off by stealth_mode; deferred items stay in the local assumptions log.
    defaultValue: false
  - name: needs_plan_revision
    type: boolean
    description: Whether assumption feedback requires returning to plan-prepare for approach revision.
    defaultValue: false
  - name: needs_further_discussion
    type: boolean
    description: Whether further stakeholder discussion is needed.
    defaultValue: false
  - name: has_stakeholder_input
    type: boolean
    description: Whether stakeholder discussion transcript was provided.
    defaultValue: false
  - name: stakeholder_review_complete
    type: boolean
    description: Whether stakeholder review of assumptions is complete.
    defaultValue: false
  - name: post_jira_comment
    type: boolean
    description: Whether to post an assumptions comment to Jira. Kept false — the posting steps are additionally stealth-gated; declared so shared checkpoint effects write a declared variable.
    defaultValue: false
  - name: ticket_refactor_needed
    type: boolean
    description: Review-mode-only flag from design-philosophy's ticket-completeness checkpoint; inert here (is_review_mode is always false). Declared so the shared checkpoint's effects target a declared variable.
    defaultValue: false
  - name: ticket_gaps_documented
    type: boolean
    description: Review-mode-only flag from design-philosophy's ticket-completeness checkpoint; inert here (is_review_mode is always false). Declared so the shared checkpoint's effects target a declared variable.
    defaultValue: false
  - name: implementation_plan
    type: object
    description: "Implementation plan produced by plan-prepare. Sub-shape: { task_count, tasks: [{ id, description, status }] }. The implement loop iterates implementation_plan.tasks."
  - name: current_task
    type: object
    description: Current task during the implementation loop (from implementation_plan.tasks).
  - name: has_uncertain_symbols
    type: boolean
    description: True when the current implement task's self-review flagged symbols whose provenance could not be confirmed; drives the symbol-provenance checkpoint.
    defaultValue: false
  - name: uncertain_symbols
    type: string
    description: Multi-line list of symbols flagged by the implement self-review (empty when has_uncertain_symbols is false).
    defaultValue: ""
  - name: validation_passed
    type: boolean
    description: Whether the validation phase passed.
    defaultValue: false
  - name: validation_results
    type: object
    description: "Aggregate validation envelope emitted by cargo-operations::run-suite — { check_status, clippy_status, test_status, fmt_status, validation_passed }. The validate activity reads its fields by dotted path to drive the fix-revalidate loop."
  - name: review_passed
    type: boolean
    description: Whether strategic review passed.
    defaultValue: false
  - name: needs_code_fixes
    type: boolean
    description: Whether code review findings require fixes before proceeding.
    defaultValue: false
  - name: needs_test_improvements
    type: boolean
    description: Whether the test suite needs improvements before proceeding.
    defaultValue: false
  - name: gitnexus_indexed
    type: boolean
    description: Whether reference_path has a usable GitNexus index. This workflow does not index the reference (kept false), so GitNexus-dependent steps in shared activities gate out.
    defaultValue: false
  - name: prism_artifact_paths
    type: array
    description: Paths to prism structural analysis artifacts produced during post-impl-review.
  - name: block_path
    type: string
    description: File path of the code block referenced by the current implementation or review block.
    defaultValue: ""
  - name: block_line_range
    type: string
    description: Line range (e.g., 120-145) of the current code block; pairs with block_path.
    defaultValue: ""
  - name: change_block_index
    type: string
    description: Absolute path to the index file mapping change-block IDs to per-block artifacts.
    defaultValue: ""
  - name: flagged_block_indices
    type: array
    description: Change-block indices flagged by the user during manual diff review.
  - name: current_block_index
    type: number
    description: Current block index during the manual diff review loop (from flagged_block_indices).
    defaultValue: 0
  - name: has_flagged_blocks
    type: boolean
    description: Whether the user flagged any change blocks during manual diff review.
    defaultValue: false
  - name: has_critical_blocker
    type: boolean
    description: Whether any flagged block is a critical blocker.
    defaultValue: false
  - name: skip_architecture_summary
    type: boolean
    description: Whether to skip architecture summary creation in post-impl-review.
    defaultValue: false
  - name: needs_strategic_fixes
    type: boolean
    description: Whether strategic review findings require fixes.
    defaultValue: false
  - name: strategic_fixes_selective
    type: boolean
    description: Whether the user chose to fix only selected strategic-review findings; set by the review-findings checkpoint's selective-fixes option.
    defaultValue: false
  - name: strategic_findings_deferred
    type: boolean
    description: Whether the user deferred strategic-review findings (noted but proceeding); set by the review-findings checkpoint's defer-findings option.
    defaultValue: false
  - name: strategic_findings_summary
    type: string
    description: Concise multi-line summary of strategic-review findings (severity tag + one line each); empty when no findings. Gates and populates the review-findings checkpoint.
    defaultValue: ""
  - name: needs_cleanup
    type: boolean
    description: Whether minor cleanup is needed from strategic review.
    defaultValue: false
  - name: unsigned_commits_in_pr
    type: boolean
    description: True when any commit in the branch range has no valid GPG signature.
    defaultValue: false
  - name: resign_unsigned_commits_requested
    type: boolean
    description: User chose to re-sign unsigned commits at the strategic-review checkpoint.
    defaultValue: false
  - name: unsigned_commit_list_summary
    type: string
    description: Short human-readable summary of unsigned commits from the strategic-review signature scan; empty when all commits are signed.
    defaultValue: ""
  - name: recommended_strategic_option
    type: string
    description: Agent-recommended action after strategic review analysis (fix-findings|acceptable). Set by the analyze-strategic-findings step.
  - name: audit_confirmed
    type: boolean
    description: True once the user has resolved the lean-coding-audit's audit-findings-confirmed gate (accept, apply-simplifications, or dispute).
    defaultValue: false
  - name: needs_simplification
    type: boolean
    description: Whether accepted simplifications remain to apply at the audit-findings-confirmed gate. Drives the simplification-apply-cycle loop in lean-coding-audit; re-assessed each iteration after the safety floor is re-validated and cleared once the re-score surfaces no further accepted simplifications.
    defaultValue: false
  - name: has_debt_markers
    type: boolean
    description: Whether the harvest-debt step found at least one ponytail marker in the tree. Set by lean-coding-audit's harvest-debt step; gates the report-gain step.
    defaultValue: false
  - name: worktree_created
    type: boolean
    description: Kept false — this workflow develops in the user-supplied private checkout, so complete's remove-worktree step gates out.
    defaultValue: false
  - name: push_remote
    type: string
    description: Git remote every push targets — always the private 'security' remote for this workflow. Consumed by manage-git::push-commits and the stealth-mode isolation checks in the shared submit-for-review activity.
    defaultValue: security
  - name: push_remote_url
    type: string
    description: URL the 'security' remote resolves to, captured by manage-git::verify-remote-private and shown in the final isolation confirmation.
    defaultValue: ""
  - name: squash_merge_supported
    type: boolean
    description: Kept false — merge-strategy guidance is a public-PR concern; the stealth gates keep it out of this workflow, and the DCO checkpoint renders this as unavailable.
    defaultValue: false
  - name: review_requires_changes
    type: boolean
    description: Kept false — the PR review cycle is stealth-gated out, so the shared submit-for-review activity's default transition to complete always applies.
    defaultValue: false
initialActivity: start
activities:
  - 01-start.yaml
  - work-package/02-design-philosophy.yaml
  - work-package/03-requirements-elicitation.yaml
  - work-package/04-research.yaml
  - work-package/05-implementation-analysis.yaml
  - work-package/06-plan-prepare.yaml
  - work-package/07-assumptions-review.yaml
  - work-package/08-implement.yaml
  - work-package/09-lean-coding-audit.yaml
  - work-package/10-post-impl-review.yaml
  - work-package/11-validate.yaml
  - work-package/12-strategic-review.yaml
  - work-package/13-submit-for-review.yaml
  - work-package/14-complete.yaml
  - work-package/15-codebase-comprehension.yaml

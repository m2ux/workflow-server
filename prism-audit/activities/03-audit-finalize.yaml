id: audit-finalize
version: 2.0.0
name: Audit Report Finalization
description: Assemble the audit deliverables from prism's REPORT.md and DEFINITIVE-FINDINGS.md.
steps:
  - kind: technique
    id: split-report
    technique: split-report
  - kind: technique
    id: create-detailed-findings
    technique: create-detailed-findings
  - kind: technique
    id: create-trade-off-analysis
    technique: create-trade-off-analysis
  - kind: technique
    id: apply-formatting-rules
    technique: apply-formatting-rules
  - kind: technique
    id: verify-artifacts
    technique: verify-audit-consistency
  - kind: action
    id: verify-outcomes
    actions:
      - action: validate
        description: All three audit deliverables exist before delivery
        condition:
          type: and
          conditions:
            - type: simple
              variable: audit_report_path
              operator: exists
            - type: simple
              variable: detailed_findings_path
              operator: exists
            - type: simple
              variable: trade_offs_path
              operator: exists
outcome:
  - "The consumer has a cross-validated, severity-calibrated audit they can act on: a navigable summary, expanded per-finding write-ups, and the design trade-offs behind the findings"
transitions:
  - to: deliver-audit
    isDefault: true

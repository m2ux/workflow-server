id: execute-analysis
version: 1.3.0
name: Execute Prism Analysis
description: Trigger the prism workflow for each audit scope and record each run from its manifest.
techniques:
  - scatter-gather
triggers:
  - workflow: prism
    description: Execute prism analytical pipeline for each audit scope.
    passContext:
      - target
      - target_description
      - output_path
      - pipeline_mode
      - analysis_focus
steps:
  - kind: action
    id: verify-preconditions
    actions:
      - action: validate
        description: Verify audit_scopes is non-empty before starting the trigger loop
        condition:
          type: simple
          variable: audit_scopes
          operator: exists
  - kind: action
    id: prepare-triggers
    actions:
      - action: set
        target: completed_analyses
        value: "[]"
      - action: set
        target: all_analysis_artifact_paths
        value: "[]"
  - kind: loop
    id: scope-iteration
    name: Audit Scope Iteration
    loopType: forEach
    variable: current_scope
    over: audit_scopes
    maxIterations: 10
    steps:
      - kind: technique
        id: set-trigger-context
        technique: execute-analysis::compose-trigger-context
      - kind: technique
        id: trigger-prism
        technique:
          name: workflow-engine::handle-sub-workflow
          inputs:
            workflow_id: prism
      - kind: technique
        id: read-run-manifest
        technique: read-run-manifest
outcome:
  - Every audit scope has a completed prism analysis whose contract artifacts finalization can consolidate into deliverables
transitions:
  - to: audit-finalize
    isDefault: true

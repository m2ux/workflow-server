id: prism-audit
version: 1.1.0
title: Security Audit Workflow
description: Orchestrate security audits by generating tailored audit prompts from user descriptions and triggering prism workflow(s) for analysis. Audit-specific customisation is isolated here, keeping the prism workflow generic.
author: m2ux
tags:
  - audit
  - security
  - prism
  - codebase-analysis
  - vulnerability-assessment
  - report-generation
rules:
  workflow:
    - "ORCHESTRATION MODEL: This workflow uses an orchestrator with disposable workers. The orchestrator manages transitions and triggers. Workers execute activities in fresh contexts. Prism workflows are triggered via the trigger-workflow mechanism, not called inline."
    - "CONTRACT REUSE: prism owns analysis, per-unit iteration, blast-radius enrichment, methodology-stripping, finding-ID assignment, and consolidation within a run. This workflow adds only what prism does not: audit-prompt generation (security characteristics, trust boundaries, audit domains), cross-scope consolidation, and the audit deliverables. It sets analysis_focus to the generated audit prompt (naming the scope's security domains so prism assigns domain-prefixed finding IDs), reads prism's contract artifacts (`RUN-MANIFEST.md`, `REPORT.md`, `DEFINITIVE-FINDINGS.md`), and never re-reads prism's raw pass artifacts."
  activity:
    - "WORKER PERMISSIONS: Sub-agents dispatched in this workflow have FULL READ/WRITE permissions. Workers MUST write all artifacts directly to target paths WITHOUT asking for permission."
    - "ARTIFACT VERIFICATION: After writing each artifact, workers MUST report: (a) file path written, (b) file size (KB), (c) format validation status (OK or FAIL)."
techniques:
  activity:
    - variable-binding
variables:
  - name: audit_description
    type: string
    description: User's description of what to audit and any specific focus areas or concerns
    required: true
  - name: target_path
    type: string
    description: Path to the codebase or directory to audit
    required: true
  - name: target
    type: string
    description: Per-scope evaluation target passed to the triggered prism run — set by execute-analysis::compose-trigger-context from the current scope
  - name: target_description
    type: string
    description: Per-scope description passed to the triggered prism run for its report scope statement — set by execute-analysis::compose-trigger-context
  - name: output_path
    type: string
    description: Directory to write all audit artifacts (prompt, analysis, reports)
    required: true
  - name: audit_prompt
    type: string
    description: Generated audit prompt text produced by the prompt-generation activity
  - name: audit_prompt_path
    type: string
    description: File path to the written audit-prompt.md artifact
  - name: pipeline_mode
    type: string
    description: "Prism pipeline mode to use for analysis (default: full-prism for thorough audit coverage)"
    defaultValue: full-prism
  - name: audit_scopes
    type: array
    description: "Array of scope objects for triggering prism runs. Each scope: { target, output_subdir, pipeline_mode, analysis_focus }. Populated by prompt-generation based on codebase structure."
  - name: current_scope
    type: object
    description: Current audit scope during the execute-analysis iteration loop
  - name: completed_analyses
    type: array
    description: "Array of completed prism runs, each read from that run's RUN-MANIFEST.md: { report_path, definitive_findings_path, status } plus the run's scope reference"
  - name: all_analysis_artifact_paths
    type: array
    description: Accumulated paths to all analysis artifacts across triggered prism workflows, taken from each run's manifest
  - name: audit_report_path
    type: string
    description: Path to the final AUDIT-REPORT.md
  - name: detailed_findings_path
    type: string
    description: Path to DETAILED-FINDINGS.md
  - name: trade_offs_path
    type: string
    description: Path to DESIGN-TRADE-OFFS.md
  - name: gitnexus_available
    type: boolean
    description: Whether GitNexus has indexed the target codebase — set during scope-definition index-codebase step
    defaultValue: false
  - name: scope_confirmed
    type: boolean
    description: Whether the user confirmed the audit scope at the confirm-scope checkpoint
    defaultValue: false
  - name: security_characteristics_count
    type: number
    description: Count of security-relevant patterns found in the target during reconnaissance. Gates the no-security-characteristics checkpoint (fires when 0).
    defaultValue: 0
initialActivity: scope-definition

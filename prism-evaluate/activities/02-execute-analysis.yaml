id: execute-analysis
version: 1.4.0
name: Execute Prism Analyses
description: Trigger the prism workflow for each execution group.
techniques:
  - scatter-gather
triggers:
  - workflow: prism
    description: Execute prism analytical pipeline for each execution group. Each trigger passes the target, target type, output path, pipeline mode, selected lenses, and the dimension-specific analysis focus.
    passContext:
      - target
      - target_type
      - target_description
      - output_path
      - pipeline_mode
      - selected_lenses
      - analysis_focus
steps:
  - kind: action
    id: verify-preconditions
    actions:
      - action: validate
        message: Verify execution_groups is non-empty before starting the trigger loop
        condition:
          type: simple
          variable: execution_groups
          operator: exists
  - kind: action
    id: log-execution-plan
    actions:
      - action: log
        message: Log the execution group count, their pipeline modes, and total dimensions covered.
  - kind: action
    id: prepare-triggers
    actions:
      - action: set
        target: completed_analyses
        value: "[]"
      - action: set
        target: all_artifact_paths
        value: "[]"
  - kind: loop
    id: group-iteration
    name: Execution Group Iteration
    loopType: forEach
    variable: current_group
    over: execution_groups
    maxIterations: 10
    steps:
      - kind: action
        id: set-trigger-context
        actions:
          - action: set
            target: target
            value: "{target_path}"
          - action: set
            target: target_type
            description: "Prism's expected value mapped from the classification: 'document', 'document-set', and 'mixed' to 'general'; 'codebase' to 'code'."
          - action: set
            target: target_description
            description: "A short description of what this group evaluates — the group's dimension name(s) and focus — for prism's report scope statement."
          - action: set
            target: output_path
            value: "{output_path}/{current_group.output_subdir}"
          - action: set
            target: pipeline_mode
            value: "{current_group.pipeline_mode}"
          - action: set
            target: selected_lenses
            value: "{current_group.lenses}"
          - action: set
            target: analysis_focus
            value: "{current_group.analysis_focus}"
      - kind: technique
        id: trigger-prism
        technique:
          name: workflow-engine::handle-sub-workflow
          inputs:
            workflow_id: prism
      - kind: technique
        id: read-run-manifest
        technique: read-run-manifest
outcome:
  - Every planned dimension has been analysed through the prism pipeline; any run that failed is flagged so coverage gaps are visible rather than silent
transitions:
  - to: consolidate-report
    isDefault: true

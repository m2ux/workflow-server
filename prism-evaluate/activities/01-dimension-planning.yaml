id: dimension-planning
version: 1.2.0
name: Plan Dimension Analysis
description: Map each evaluation dimension to prism pipeline modes and lenses.
steps:
  - kind: technique
    id: survey-target
    technique: plan-evaluation::survey-target
  - kind: technique
    id: map-dimensions
    technique: plan-evaluation::map-dimensions-to-lenses
  - kind: technique
    id: group-dimensions
    technique: plan-evaluation::group-for-execution
  - kind: technique
    id: write-plan
    technique: plan-evaluation::write-evaluation-plan
  - kind: checkpoint
    id: confirm-plan
    message: Please confirm the dimension-to-lens mapping and execution plan before triggering prism analyses.
    options:
      - id: accept
        label: Proceed
        description: Execute the evaluation plan
        effect:
          setVariable:
            dimensions_confirmed: true
      - id: adjust
        label: Adjust plan
        description: Modify the lens mapping, pipeline modes, or execution grouping
        effect:
          transitionTo: dimension-planning
    blocking: true
outcome:
  - Each dimension is matched to the prism pipeline modes and lenses that will surface target-specific findings, grouped into runnable batches the analysis stage can execute directly
transitions:
  - to: execute-analysis
    condition:
      type: simple
      variable: dimensions_confirmed
      operator: ==
      value: true
    isDefault: true

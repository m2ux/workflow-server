id: quality-review
version: 1.11.0
name: Quality Review
description: Quality review of drafted workflow content.
required: true
steps:
  - kind: loop
    id: multi-target-review-loop
    name: Multi-Target Review Loop
    loopType: forEach
    variable: target_workflow_id
    over: target_workflow_ids
    maxIterations: 20
    condition:
      type: simple
      variable: operation_type
      operator: ==
      value: review
    steps:
      - kind: technique
        id: load-all-workflow-files
        technique: reload-workflow
      - kind: technique
        id: principle-compliance-audit
        technique: audit-principles
      - kind: technique
        id: anti-pattern-scan
        technique: audit-anti-patterns
      - kind: technique
        id: schema-validation-check
        technique: audit-schema-validation
      - kind: technique
        id: verify-high-findings-review
        technique: verify-high-findings
      - kind: technique
        id: compile-report
        technique: compile-report
  - kind: technique
    id: persist-compliance-report
    technique: persist-report
    condition:
      type: simple
      variable: operation_type
      operator: ==
      value: review
  - kind: checkpoint
    id: review-disposition
    condition:
      type: simple
      variable: operation_type
      operator: ==
      value: review
    message: "Compliance report complete. {review_findings_count} findings across {target_workflow_ids} ([compliance report]({report_path}); [principle findings]({principle_findings_path}); [anti-pattern findings]({anti_pattern_findings_path}); [verified findings]({verified_findings_path}))."
    options:
      - id: fix-issues
        label: Fix identified issues
        description: Switch to update mode and apply recommended fixes
        effect:
          setVariable:
            operation_type: update
            update_seeded_from_review: true
          transitionTo: intake-and-context
      - id: report-only
        label: Report only — no changes
        description: Save the compliance report without making changes
      - id: selective-fixes
        label: Selective fixes
        description: Choose which findings to fix
        effect:
          setVariable:
            operation_type: update
            update_seeded_from_review: true
          transitionTo: intake-and-context
  - kind: technique
    id: audit-expressiveness
    technique: audit-expressiveness
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
        - type: simple
          variable: scope_manifest_confirmed
          operator: ==
          value: true
  - kind: action
    id: expressiveness-clean
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
        - type: simple
          variable: scope_manifest_confirmed
          operator: ==
          value: true
        - type: simple
          variable: expressiveness_finding_count
          operator: ==
          value: 0
    actions:
      - action: message
        message: Schema expressiveness review complete — 0 findings.
  - kind: checkpoint
    id: expressiveness-confirmed
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
        - type: simple
          variable: scope_manifest_confirmed
          operator: ==
          value: true
        - type: simple
          variable: expressiveness_finding_count
          operator: ">"
          value: 0
    message: "Schema expressiveness review complete. {expressiveness_finding_count} findings ([expressiveness findings]({expressiveness_findings_path}))."
    blocking: false
    defaultOption: confirmed
    autoAdvanceMs: 30000
    options:
      - id: confirmed
        label: Accept corrections
        description: Apply the expressiveness corrections
      - id: revise
        label: Revise corrections
        description: Change some of the corrections
  - kind: technique
    id: audit-conformance
    technique: audit-conformance
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
        - type: simple
          variable: scope_manifest_confirmed
          operator: ==
          value: true
  - kind: action
    id: conformance-clean
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
        - type: simple
          variable: scope_manifest_confirmed
          operator: ==
          value: true
        - type: simple
          variable: conformance_finding_count
          operator: ==
          value: 0
    actions:
      - action: message
        message: Convention conformance review complete — 0 divergences.
  - kind: checkpoint
    id: conformance-confirmed
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
        - type: simple
          variable: scope_manifest_confirmed
          operator: ==
          value: true
        - type: simple
          variable: conformance_finding_count
          operator: ">"
          value: 0
    message: "Convention conformance review complete. {conformance_finding_count} divergences ([conformance findings]({conformance_findings_path}))."
    blocking: false
    defaultOption: fix-all
    autoAdvanceMs: 30000
    options:
      - id: fix-all
        label: Fix all divergences
        description: Bring all content into conformance
      - id: selective
        label: Selective fixes
        description: Fix some divergences, keep justified ones
      - id: accept-as-is
        label: Accept as-is
        description: The divergences are intentional
  - kind: technique
    id: audit-rule-hygiene
    technique: audit-rule-hygiene
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
        - type: simple
          variable: scope_manifest_confirmed
          operator: ==
          value: true
  - kind: action
    id: rule-hygiene-clean
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
        - type: simple
          variable: scope_manifest_confirmed
          operator: ==
          value: true
        - type: simple
          variable: rule_hygiene_finding_count
          operator: ==
          value: 0
    actions:
      - action: message
        message: Rule hygiene audit complete — 0 findings.
  - kind: checkpoint
    id: rule-hygiene-confirmed
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
        - type: simple
          variable: scope_manifest_confirmed
          operator: ==
          value: true
        - type: simple
          variable: rule_hygiene_finding_count
          operator: ">"
          value: 0
    message: "Rule hygiene audit complete. {rule_hygiene_finding_count} findings ([rule hygiene findings]({rule_hygiene_findings_path}))."
    blocking: false
    defaultOption: fix-all
    autoAdvanceMs: 30000
    options:
      - id: fix-all
        label: Fix all findings
        description: Remove restatements, resolve contradictions, deduplicate, regroup
      - id: selective
        label: Selective fixes
        description: Choose which findings to address
  - kind: technique
    id: audit-rule-enforcement
    technique: audit-rule-enforcement
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
        - type: simple
          variable: scope_manifest_confirmed
          operator: ==
          value: true
  - kind: action
    id: enforcement-clean
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
        - type: simple
          variable: scope_manifest_confirmed
          operator: ==
          value: true
        - type: simple
          variable: enforcement_finding_count
          operator: ==
          value: 0
    actions:
      - action: message
        message: Rule-to-structure audit complete — 0 text-only rules.
  - kind: checkpoint
    id: enforcement-confirmed
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
        - type: simple
          variable: scope_manifest_confirmed
          operator: ==
          value: true
        - type: simple
          variable: enforcement_finding_count
          operator: ">"
          value: 0
    message: "Rule-to-structure audit complete. {enforcement_finding_count} text-only rules ([enforcement findings]({enforcement_findings_path}))."
    blocking: false
    defaultOption: add-enforcement
    autoAdvanceMs: 30000
    options:
      - id: add-enforcement
        label: Add structural enforcement
        description: Ship checkpoints, conditions, or validate actions for the flagged rules — the fix cycle applies the structural change and records enforcement as added
        effect:
          setVariable:
            needs_audit_fixes: true
      - id: accept-text-only
        label: Accept text-only rules — no structural change
        description: Ship no structural change; the flagged rules stay as text-only guidance and are recorded as accepted text-only
  - kind: technique
    id: verify-high-findings
    technique: verify-high-findings
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
        - type: simple
          variable: scope_manifest_confirmed
          operator: ==
          value: true
  - kind: action
    id: announce-verified-findings
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
        - type: simple
          variable: scope_manifest_confirmed
          operator: ==
          value: true
    actions:
      - action: message
        message: "Verified audit findings ([verified findings]({verified_findings_path}))."
  - kind: action
    id: classify-audit-findings
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
        - type: simple
          variable: scope_manifest_confirmed
          operator: ==
          value: true
    actions:
      - action: set
        target: needs_audit_fixes
        message: Set true iff the verified findings (verified_findings, recalibrated by verify-high-findings) include findings the user elected to fix (fix-all / selective / revise), or enforcement-confirmed chose add-enforcement. False when every presented pass was accepted as-is, and when a pass was skipped because its finding count was 0 (zero-finding passes never elect fixes).
      - action: set
        target: has_critical_finding
        message: Set true iff any verified finding (verified_findings) is Critical severity — a schema-invalid or structurally broken construct that must not be committed.
  - kind: loop
    id: audit-fix-cycle
    name: Audit Fix Cycle
    loopType: while
    condition:
      type: simple
      variable: needs_audit_fixes
      operator: ==
      value: true
    maxIterations: 3
    steps:
      - kind: technique
        id: apply-audit-fixes
        technique: apply-audit-fixes
      - kind: technique
        id: re-audit-expressiveness
        technique: audit-expressiveness
      - kind: technique
        id: re-audit-conformance
        technique: audit-conformance
      - kind: technique
        id: re-audit-rule-hygiene
        technique: audit-rule-hygiene
      - kind: technique
        id: re-audit-rule-enforcement
        technique: audit-rule-enforcement
      - kind: action
        id: reassess-audit-fixes
        actions:
          - action: set
            target: needs_audit_fixes
            message: After re-running the audits, set true iff fixable findings remain that the user still wants applied; false when the content is clean.
          - action: set
            target: has_critical_finding
            message: After re-running the audits, set true iff any remaining finding is Critical severity.
decisions:
  - id: blocker-gate
    name: Critical Blocker Gate
    branches:
      - id: has-blocker
        label: Critical finding remains — return to drafting
        condition:
          type: simple
          variable: has_critical_finding
          operator: ==
          value: true
        transitionTo: scope-and-draft
      - id: no-blocker
        label: No critical findings — proceed to validate and commit
        isDefault: true
transitions:
  - to: validate-and-commit
    isDefault: true
outcome:
  - The workflow expresses its logic in schema constructs the engine can act on, not prose an agent must interpret — behavior is structural, not advisory
  - The content reads and behaves like its sibling workflows, so users and agents carry one mental model across the whole library
  - The rule set is lean and trustworthy — no restatements of protocol the engine already enforces, no contradictions, no duplicated guidance to drift out of sync
  - Critical rules are enforced by structure rather than hope, so they hold even when an agent skips the prose

id: quality-review
version: 1.12.3
name: Quality Review
description: Quality review of drafted workflow content.
required: true
steps:
  - kind: loop
    id: multi-target-review-loop
    name: Multi-Target Review Loop
    loopType: forEach
    variable: target_workflow_id
    over: target_workflow_ids
    maxIterations: 20
    condition:
      type: simple
      variable: operation_type
      operator: ==
      value: review
    steps:
      - kind: technique
        id: load-all-workflow-files
        technique: reload-workflow
      - kind: technique
        id: principle-compliance-audit
        technique: audit-principles
      - kind: technique
        id: anti-pattern-scan
        technique: audit-anti-patterns
      - kind: technique
        id: schema-validation-check
        technique: audit-schema-validation
      - kind: technique
        id: verify-high-findings-review
        technique: verify-high-findings
      - kind: technique
        id: compile-report
        technique: compile-report
  - kind: technique
    id: persist-compliance-report
    technique: persist-report
    condition:
      type: simple
      variable: operation_type
      operator: ==
      value: review
  - kind: checkpoint
    id: review-disposition
    condition:
      type: simple
      variable: operation_type
      operator: ==
      value: review
    message: "Compliance report complete. {review_findings_count} findings across {target_workflow_ids} ([compliance report]({report_path}))."
    blocking: true
    options:
      - id: fix-issues
        label: Fix identified issues
        description: Switch to update mode and apply recommended fixes
        effect:
          setVariable:
            operation_type: update
            update_seeded_from_review: true
          transitionTo: intake-and-context
      - id: report-only
        label: Report only — no changes
        description: Save the compliance report without making changes
      - id: selective-fixes
        label: Selective fixes
        description: Choose which findings to fix
        effect:
          setVariable:
            operation_type: update
            update_seeded_from_review: true
          transitionTo: intake-and-context
  - kind: technique
    id: audit-expressiveness
    technique: audit-expressiveness
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
        - type: simple
          variable: scope_manifest_confirmed
          operator: ==
          value: true
  - kind: action
    id: expressiveness-clean
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
        - type: simple
          variable: scope_manifest_confirmed
          operator: ==
          value: true
        - type: simple
          variable: expressiveness_finding_count
          operator: ==
          value: 0
    actions:
      - action: message
        message: Schema expressiveness review complete — 0 findings.
  - kind: action
    id: expressiveness-findings-flagged
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
        - type: simple
          variable: scope_manifest_confirmed
          operator: ==
          value: true
        - type: simple
          variable: expressiveness_finding_count
          operator: ">"
          value: 0
    actions:
      - action: message
        message: "Schema expressiveness review complete. {expressiveness_finding_count} findings will be fixed in the audit fix cycle ([expressiveness findings]({expressiveness_findings_path}))."
  - kind: technique
    id: audit-conformance
    technique: audit-conformance
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
        - type: simple
          variable: scope_manifest_confirmed
          operator: ==
          value: true
  - kind: action
    id: conformance-clean
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
        - type: simple
          variable: scope_manifest_confirmed
          operator: ==
          value: true
        - type: simple
          variable: conformance_finding_count
          operator: ==
          value: 0
    actions:
      - action: message
        message: Convention conformance review complete — 0 divergences.
  - kind: action
    id: conformance-findings-flagged
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
        - type: simple
          variable: scope_manifest_confirmed
          operator: ==
          value: true
        - type: simple
          variable: conformance_finding_count
          operator: ">"
          value: 0
    actions:
      - action: message
        message: "Convention conformance review complete. {conformance_finding_count} divergences will be fixed in the audit fix cycle ([conformance findings]({conformance_findings_path}))."
  - kind: technique
    id: audit-rule-hygiene
    technique: audit-rule-hygiene
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
        - type: simple
          variable: scope_manifest_confirmed
          operator: ==
          value: true
  - kind: action
    id: rule-hygiene-clean
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
        - type: simple
          variable: scope_manifest_confirmed
          operator: ==
          value: true
        - type: simple
          variable: rule_hygiene_finding_count
          operator: ==
          value: 0
    actions:
      - action: message
        message: Rule hygiene audit complete — 0 findings.
  - kind: action
    id: rule-hygiene-findings-flagged
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
        - type: simple
          variable: scope_manifest_confirmed
          operator: ==
          value: true
        - type: simple
          variable: rule_hygiene_finding_count
          operator: ">"
          value: 0
    actions:
      - action: message
        message: "Rule hygiene audit complete. {rule_hygiene_finding_count} findings will be fixed in the audit fix cycle ([rule hygiene findings]({rule_hygiene_findings_path}))."
  - kind: technique
    id: audit-rule-enforcement
    technique: audit-rule-enforcement
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
        - type: simple
          variable: scope_manifest_confirmed
          operator: ==
          value: true
  - kind: action
    id: enforcement-clean
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
        - type: simple
          variable: scope_manifest_confirmed
          operator: ==
          value: true
        - type: simple
          variable: enforcement_finding_count
          operator: ==
          value: 0
    actions:
      - action: message
        message: Rule-to-structure audit complete — 0 text-only rules.
  - kind: action
    id: enforcement-findings-flagged
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
        - type: simple
          variable: scope_manifest_confirmed
          operator: ==
          value: true
        - type: simple
          variable: enforcement_finding_count
          operator: ">"
          value: 0
    actions:
      - action: message
        message: "Rule-to-structure audit complete. {enforcement_finding_count} text-only rules will get structural enforcement in the audit fix cycle ([enforcement findings]({enforcement_findings_path}))."
  - kind: technique
    id: verify-high-findings
    technique: verify-high-findings
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
        - type: simple
          variable: scope_manifest_confirmed
          operator: ==
          value: true
  - kind: action
    id: classify-audit-findings
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
        - type: simple
          variable: scope_manifest_confirmed
          operator: ==
          value: true
    actions:
      - action: set
        target: needs_audit_fixes
        message: Set true iff any of expressiveness_finding_count, conformance_finding_count, rule_hygiene_finding_count, or enforcement_finding_count is greater than 0, or the verified findings (verified_findings, recalibrated by verify-high-findings) still list fixable items. False only when every pass's finding count is 0.
      - action: set
        target: has_critical_finding
        message: Set true iff any verified finding (verified_findings) is Critical severity — a schema-invalid or structurally broken construct that must not be committed.
  - kind: loop
    id: audit-fix-cycle
    name: Audit Fix Cycle
    loopType: while
    condition:
      type: simple
      variable: needs_audit_fixes
      operator: ==
      value: true
    maxIterations: 3
    steps:
      - kind: technique
        id: apply-audit-fixes
        technique: apply-audit-fixes
      - kind: technique
        id: re-audit-expressiveness
        technique: audit-expressiveness
      - kind: technique
        id: re-audit-conformance
        technique: audit-conformance
      - kind: technique
        id: re-audit-rule-hygiene
        technique: audit-rule-hygiene
      - kind: technique
        id: re-audit-rule-enforcement
        technique: audit-rule-enforcement
      - kind: action
        id: reassess-audit-fixes
        actions:
          - action: set
            target: needs_audit_fixes
            message: After re-running the audits, set true iff any of the four re-audited finding counts (expressiveness, conformance, rule hygiene, enforcement) is still greater than 0; false when every pass comes back at 0 findings.
          - action: set
            target: has_critical_finding
            message: After re-running the audits, set true iff any remaining finding is Critical severity.
decisions:
  - id: blocker-gate
    name: Critical Blocker Gate
    branches:
      - id: has-blocker
        label: Critical finding remains — return to drafting
        condition:
          type: simple
          variable: has_critical_finding
          operator: ==
          value: true
        transitionTo: scope-and-draft
      - id: no-blocker
        label: No critical findings — proceed to validate and commit
        isDefault: true
transitions:
  - to: validate-and-commit
    isDefault: true
outcome:
  - The workflow expresses its logic in schema constructs the engine can act on, not prose an agent must interpret — behavior is structural, not advisory
  - The content reads and behaves like its sibling workflows, so users and agents carry one mental model across the whole library
  - The rule set is lean and trustworthy — no restatements of protocol the engine already enforces, no contradictions, no duplicated guidance to drift out of sync
  - Critical rules are enforced by structure rather than hope, so they hold even when an agent skips the prose

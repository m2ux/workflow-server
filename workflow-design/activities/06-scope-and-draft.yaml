id: scope-and-draft
version: 1.2.0
name: Scope and Draft
description: Complete file manifest and structural design for the target workflow, followed by a per-file drafting and review pass over every entry in the confirmed scope manifest, with schema validation on each YAML file.
required: true
techniques:
  - scatter-gather
rules:
  - The scope manifest must include every file to be created, modified, or removed — no implicit files
  - Verify the workflows worktree is checked out and on the correct branch before defining paths
  - Present the structural design compared against adopted patterns from pattern analysis
  - Present approach for each file before drafting — what constructs will be used, what patterns followed
  - Use formal schema constructs for every piece of structured information — no prose where a construct exists
  - Validate each YAML file against its schema immediately after drafting
  - In update mode, compare new content against existing content and flag any material being removed
  - "Draft files in the confirmed order: workflow.yaml first, then activities, then techniques, then resources, then README"
steps:
  - kind: action
    id: verify-preconditions
    actions:
      - action: validate
        target: scope_manifest_confirmed
        message: Cannot begin content drafting without a confirmed scope manifest
  - kind: technique
    id: scope-definition
    technique: scope-definition
  - kind: checkpoint
    id: scope-and-structure-confirmed
    message: Here is the complete file manifest and implementation order. Proceeding in 30s unless you want to revise.
    blocking: false
    defaultOption: confirmed
    autoAdvanceMs: 30000
    options:
      - id: confirmed
        label: Yes, scope and structure are correct
        description: File manifest and implementation order are accurate.
        effect:
          setVariable:
            scope_manifest_confirmed: true
            approach_confirmed: true
      - id: revise
        label: Needs revision
        description: File manifest or implementation order requires adjustment.
  - kind: technique
    id: present-file-approach
    technique: content-drafting
  - kind: checkpoint
    id: file-approach-confirmed
    condition:
      type: simple
      variable: is_update_mode
      operator: "!="
      value: true
    message: Here is my approach for drafting '{current_file}'. Does this look right?
    options:
      - id: confirmed
        label: Yes, proceed with this approach
        description: Drafting approach for this file is approved.
      - id: revise
        label: Change approach
        description: Drafting approach for this file requires revision.
  - kind: technique
    id: yaml-authoring
    technique: yaml-authoring
  - kind: technique
    id: present-for-review
    technique: content-drafting
  - kind: checkpoint
    id: file-review
    condition:
      type: simple
      variable: is_update_mode
      operator: "!="
      value: true
    message: Here is the drafted content for '{current_file}'. Is this acceptable?
    options:
      - id: accepted
        label: Accepted
        description: Drafted file content is accurate as presented.
      - id: revise
        label: Needs revision
        description: Drafted file content requires targeted changes.
      - id: redraft
        label: Redraft from scratch
        description: Drafted file content requires a fresh approach from scratch.
  - kind: checkpoint
    id: preservation-check
    condition:
      type: and
      conditions:
        - type: simple
          variable: is_update_mode
          operator: ==
          value: true
        - type: simple
          variable: has_unflagged_removals
          operator: ==
          value: true
    message: Content removal detected that was not flagged during impact analysis. Review the diff and confirm.
    options:
      - id: proceed
        label: Proceed with changes
        description: Detected removals are intentional and the modifications stand.
      - id: preserve-more
        label: Preserve more content
        description: Some content flagged for removal must be preserved.
      - id: rewrite
        label: Rewrite approach
        description: File-level approach requires a different framing entirely.
  - kind: action
    id: advance-to-next-file
    actions: []
  - kind: checkpoint
    id: batch-review
    condition:
      type: simple
      variable: is_update_mode
      operator: ==
      value: true
    message: All {file_count} files modified. Here is the change summary. Proceeding in 30s unless you intervene.
    blocking: false
    defaultOption: accepted
    autoAdvanceMs: 30000
    options:
      - id: accepted
        label: All changes accepted
        description: Full set of modifications across all files is approved.
      - id: revise-specific
        label: Revise a specific file
        description: One particular file requires further modification.
      - id: redraft-all
        label: Redraft all changes
        description: Entire drafting pass requires restart from scratch.
  - kind: loop
    id: file-drafting-loop
    name: File Drafting Loop
    loopType: forEach
    variable: current_file
    over: scope_manifest
    maxIterations: 50
    steps:
      - kind: technique
        id: present-file-approach
        technique: content-drafting
      - kind: technique
        id: yaml-authoring
        technique: yaml-authoring
      - kind: technique
        id: present-for-review
        technique: content-drafting
  - kind: technique
    id: review-draft-yaml
    technique: review-draft-yaml
  - kind: checkpoint
    id: draft-attestation
    message: "Drafted-content review: each block's rationale is shown above. Accepting in 30s unless you flag a block to revise before the audit passes."
    blocking: false
    defaultOption: attested
    autoAdvanceMs: 30000
    options:
      - id: attested
        label: Attest — drafted content is understood and intentional
        description: Every drafted block is reviewed and approved as presented (default — auto-accepts after 30s).
      - id: revise-block
        label: Revise a flagged block
        description: One or more drafted blocks require targeted revision before the audit passes.
transitions:
  - to: quality-review
    isDefault: true
outcome:
  - Every file the change requires is enumerated up front, closing the most common gap — work begun against an incomplete picture of what must be touched
  - The folder structure and activity flow are agreed against established patterns, so the workflow's shape is sound before any file is written
  - The full workflow is drafted with each file individually approved, giving the user a known-good body of content rather than an unreviewed dump
  - Every YAML file is schema-valid, so downstream loading and validation start from clean, conformant content

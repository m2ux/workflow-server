id: scope-and-draft
version: 1.10.0
name: Scope and Draft
description: A complete file manifest and structural design for the target workflow, drafted and reviewed file by file with schema validation on each YAML file, then planning-artifact conformance verify.
required: true
techniques:
  - scatter-gather
steps:
  - kind: technique
    id: derive-workflows-target-path
    technique: derive-workflows-target-path
    condition:
      type: simple
      variable: operation_type
      operator: "!="
      value: review
  - kind: technique
    id: ensure-workflow-worktree
    technique: prepare-workflow-branch
    condition:
      type: simple
      variable: operation_type
      operator: "!="
      value: review
  - kind: technique
    id: scope-definition
    technique: scope-definition
  - kind: technique
    id: persist-scope-manifest
    technique:
      name: work-package::manage-artifacts::write-artifact
      inputs:
        bare_filename: scope-manifest.md
        artifact_content: scope_manifest
        target_dir: planning_folder_path
  - kind: checkpoint
    id: scope-and-structure-confirmed
    message: "Complete file manifest, structural design, and drafting order ([scope manifest]({scope_manifest_path}))."
    blocking: false
    defaultOption: confirmed
    autoAdvanceMs: 30000
    options:
      - id: confirmed
        label: Yes, scope and structure are correct
        description: File manifest and implementation order are accurate.
        effect:
          setVariable:
            scope_manifest_confirmed: true
      - id: revise
        label: Needs revision
        description: File manifest or implementation order requires adjustment.
  - kind: technique
    id: present-solution-overview
    technique:
      name: work-package::stakeholder-overview
      inputs:
        readme_section_heading: "## Solution Overview"
        source_material: the confirmed scope manifest and the structural design for the target workflow
    actions:
      - action: message
        message: "Solution Overview for `{workflow_id}` — plain-language summary ([planning README]({planning_folder_path}/README.md#solution-overview))"
  - kind: loop
    id: file-drafting-loop
    name: File Drafting Loop
    loopType: forEach
    variable: current_file
    over: scope_manifest
    maxIterations: 50
    condition:
      type: simple
      variable: scope_manifest_confirmed
      operator: ==
      value: true
    steps:
      - kind: technique
        id: assemble-file-approach
        technique: assemble-file-approach
      - kind: technique
        id: persist-drafting-plan
        technique:
          name: work-package::manage-artifacts::write-artifact
          inputs:
            bare_filename: drafting-plan.md
            artifact_content: drafting_plan
            target_dir: planning_folder_path
      - kind: checkpoint
        id: file-approach-confirmed
        condition:
          type: simple
          variable: operation_type
          operator: "!="
          value: update
        message: "Drafting approach for '{current_file}' ([drafting plan]({drafting_plan_path}))."
        blocking: false
        defaultOption: confirmed
        autoAdvanceMs: 30000
        options:
          - id: confirmed
            label: Yes, proceed with this approach
            description: Drafting approach for this file is approved.
          - id: revise
            label: Change approach
            description: Drafting approach for this file requires revision.
      - kind: technique
        id: yaml-authoring
        technique: yaml-authoring
      - kind: technique
        id: review-drafted-file
        technique: review-drafted-file
      - kind: technique
        id: persist-file-review-note
        technique:
          name: work-package::manage-artifacts::write-artifact
          inputs:
            bare_filename: file-review-note.md
            artifact_content: file_review_note
            target_dir: planning_folder_path
      - kind: checkpoint
        id: file-review
        condition:
          type: simple
          variable: operation_type
          operator: "!="
          value: update
        message: "Drafted content for '{current_file}' ([file review note]({file_review_note_path}))."
        blocking: false
        defaultOption: accepted
        autoAdvanceMs: 30000
        options:
          - id: accepted
            label: Accepted
            description: Drafted file content is accurate as presented.
          - id: revise
            label: Needs revision
            description: Drafted file content requires targeted changes.
          - id: redraft
            label: Redraft from scratch
            description: Drafted file content requires a fresh approach from scratch.
      - kind: checkpoint
        id: preservation-check
        condition:
          type: and
          conditions:
            - type: simple
              variable: operation_type
              operator: ==
              value: update
            - type: simple
              variable: has_unflagged_removals
              operator: ==
              value: true
        message: "Content removal detected that was not flagged during impact analysis ([file review note]({file_review_note_path}), [impact analysis]({impact_analysis_path}))."
        options:
          - id: proceed
            label: Proceed with changes
            description: Detected removals are intentional and the modifications stand.
          - id: preserve-more
            label: Preserve more content
            description: Some content flagged for removal must be preserved.
          - id: rewrite
            label: Rewrite approach
            description: File-level approach requires a different framing entirely.
  - kind: technique
    id: review-draft-yaml
    technique: review-draft-yaml
  - kind: technique
    id: persist-draft-attestation
    technique:
      name: work-package::manage-artifacts::write-artifact
      inputs:
        bare_filename: draft-attestation.md
        artifact_content: reviewed_blocks
        target_dir: planning_folder_path
  - kind: checkpoint
    id: draft-attestation
    condition:
      type: simple
      variable: operation_type
      operator: "!="
      value: update
    message: "Drafted-content review ([draft attestation]({draft_attestation_path}))."
    blocking: false
    defaultOption: attested
    autoAdvanceMs: 30000
    options:
      - id: attested
        label: Attest — drafted content is understood and intentional
        description: Every drafted block is reviewed and approved as presented
      - id: revise-block
        label: Revise a flagged block
        description: One or more drafted blocks require targeted revision before the audit passes.
  - kind: checkpoint
    id: batch-review-attested
    condition:
      type: simple
      variable: operation_type
      operator: ==
      value: update
    message: "All {file_count} files modified ([draft attestation]({draft_attestation_path}))."
    blocking: false
    defaultOption: attested
    autoAdvanceMs: 30000
    options:
      - id: attested
        label: Attest — all changes understood and intentional
        description: Full modification set and every drafted block are approved
      - id: revise-specific
        label: Revise a specific file
        description: One particular file requires further modification.
      - id: revise-block
        label: Revise a flagged block
        description: One or more drafted blocks require targeted revision before the audit passes.
      - id: redraft-all
        label: Redraft all changes
        description: Entire drafting pass requires restart from scratch.
  - kind: technique
    id: verify-artifact-conforms
    technique: verify-artifact-conforms
transitions:
  - to: quality-review
    isDefault: true
outcome:
  - Every file the change requires is enumerated up front, closing the most common gap — work begun against an incomplete picture of what must be touched
  - The folder structure and activity flow are agreed against established patterns, so the workflow's shape is sound before any file is written
  - The full workflow is drafted with create-mode per-file review or a single update-mode batch attestation, giving the user a known-good body of content rather than an unreviewed dump
  - Every YAML file is schema-valid, so downstream loading and validation start from clean, conformant content
  - Planning artifacts conform to the design canonical-home map and template line budgets before quality-review audits

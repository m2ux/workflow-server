id: impact-analysis
version: 1.4.0
name: Impact Analysis
description: Impact assessment of proposed changes against an existing workflow's files, transitions, and references.
required: false
steps:
  - kind: action
    id: verify-preconditions
    actions:
      - action: validate
        target: is_update_mode
        message: Impact analysis requires update mode — is_update_mode must be true
  - kind: technique
    id: impact-analysis
    technique: impact-analysis
  - kind: action
    id: impact-no-removals
    condition:
      type: simple
      variable: removal_count
      operator: ==
      value: 0
    actions:
      - action: message
        message: "Impact analysis complete — no content removals flagged ([impact analysis]({impact_analysis_path}))."
  - kind: checkpoint
    id: impact-and-preservation-confirmed
    condition:
      type: simple
      variable: removal_count
      operator: ">"
      value: 0
    message: "Impact analysis: {removal_count} removal(s) flagged ([impact analysis]({impact_analysis_path}))."
    blocking: false
    defaultOption: confirmed
    autoAdvanceMs: 30000
    options:
      - id: confirmed
        label: Impact and removals look correct
        description: Impact scope is accurate and every flagged removal is intentional
      - id: revise-impact
        label: Revise impact scope
        description: Impact scope is incomplete or over-inclusive.
      - id: preserve
        label: Preserve some flagged content
        description: Some flagged content must be preserved rather than removed.
transitions:
  - to: scope-and-draft
    isDefault: true
outcome:
  - Drafting knows exactly which files the change touches and how, so the edit blast radius is bounded before any content is written
  - Transition chains and technique/resource references are known-intact, so the update won't silently orphan or break the workflow's wiring
  - No content disappears by accident — every flagged removal is one the user consciously approved (or there were none)

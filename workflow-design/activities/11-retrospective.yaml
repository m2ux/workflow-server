id: retrospective
version: 1.0.0
name: Retrospective
description: Terminal activity — record a completion summary (create/update) and conduct a session retrospective to capture lessons before the workflow ends.
required: true
rules:
  - Skip the retrospective for a trivial session — only prompted responses, with no clarifications, corrections, or process questions
  - Session history is private and is never committed to the repository
steps:
  - kind: technique
    id: create-completion-doc
    technique: create-completion-doc
    condition:
      type: simple
      variable: is_review_mode
      operator: "!="
      value: true
  - kind: technique
    id: conduct-retrospective
    technique: conduct-retrospective
outcome:
  - A completion summary records what the session delivered, the key design decisions and alternatives rejected, and known limitations
  - A session retrospective captures friction points and prioritized workflow improvements before the work ends

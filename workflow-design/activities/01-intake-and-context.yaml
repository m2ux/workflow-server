id: intake-and-context
version: 1.2.0
name: Intake and Context
description: "Establish the operation type, mode, and target for the request, and internalize the schema system and YAML-format conventions that ground all drafting."
required: true
steps:
  - kind: technique
    id: intake-classification
    technique: intake-classification
  - kind: checkpoint
    id: mode-confirmation
    condition:
      type: simple
      variable: is_review_mode
      operator: "!="
      value: true
    message: I've classified this as a {operation_type} operation for workflow '{workflow_id}'. Is this correct?
    blocking: true
    options:
      - id: confirm-create
        label: Yes, create a new workflow
        description: Create-mode classification confirmed.
        effect:
          setVariable:
            is_update_mode: false
      - id: confirm-update
        label: Yes, update an existing workflow
        description: Update-mode classification confirmed.
        effect:
          setVariable:
            is_update_mode: true
  - kind: checkpoint
    id: review-scope-confirmed
    condition:
      type: simple
      variable: is_review_mode
      operator: ==
      value: true
    message: "Compliance review is scoped to workflow id(s): {target_workflow_ids}. Confirm this target set?"
    blocking: true
    options:
      - id: confirm-review-target
        label: Yes — audit this target set
        description: Target set confirmed; review-mode quality-review iterates `target_workflow_ids` (binding each to `target_workflow_id` per iteration).
        effect:
          setVariable:
            review_scope_confirmed: true
      - id: wrong-review-target
        label: No — wrong target set
        description: Target set rejected; checkpoint remains blocking until a correct `target_workflow_ids` list is supplied.
        effect:
          setVariable:
            review_scope_confirmed: false
  - kind: technique
    id: context-loading
    technique: context-loading
  - kind: action
    id: bind-planning-folder-path
    actions:
      - action: set
        target: planning_folder_path
        message: Server-resolved canonical absolute planning folder from the start_session / get_workflow summary (under the server's workspace .engineering planning root). Write location for ALL of this design session's planning artifacts.
  - kind: technique
    id: initialize-planning-folder
    technique:
      name: work-package::manage-artifacts::create-readme
      inputs:
        entity_context: "entity_title={workflow_id}; entity_type={operation_type}; status=Planning"
        readme_template: workflow-design/design-context-readme
    condition:
      type: simple
      variable: is_review_mode
      operator: "!="
      value: true
  - kind: technique
    id: present-problem-overview
    technique:
      name: work-package::stakeholder-overview
      inputs:
        readme_section_heading: "## Problem Overview"
        source_material: the requested change, the target workflow's current shape, and any context gathered during this activity
    actions:
      - action: message
        message: "**Problem Overview** (plain-language summary for stakeholder reference)"
    condition:
      type: simple
      variable: is_review_mode
      operator: "!="
      value: true
  - kind: checkpoint
    id: change-request-confirmed
    condition:
      type: simple
      variable: is_update_mode
      operator: ==
      value: true
    message: Here is the existing workflow structure and my understanding of your requested changes. Is this correct?
    blocking: true
    options:
      - id: confirmed
        label: Yes, that's correct
        description: Change request and current structure both confirmed.
      - id: refine
        label: Needs refinement
        description: Change request requires further clarification before continuing.
      - id: cancel
        label: Cancel — create new instead
        description: Update path abandoned; mode flips back to create.
        effect:
          setVariable:
            is_update_mode: false
  - kind: checkpoint
    id: format-literacy
    condition:
      type: and
      conditions:
        - type: simple
          variable: is_review_mode
          operator: "!="
          value: true
        - type: simple
          variable: is_update_mode
          operator: "!="
          value: true
    message: I've reviewed existing YAML files and understand the format conventions. Here is my summary of YAML syntax rules and project conventions. Does this look correct?
    options:
      - id: confirmed
        label: Yes, proceed
        description: Format understanding confirmed.
        effect:
          setVariable:
            format_literacy_confirmed: true
      - id: incorrect
        label: Needs correction
        description: Format understanding has errors that must be corrected before proceeding.
  - kind: action
    id: auto-confirm-literacy
    condition:
      type: simple
      variable: is_update_mode
      operator: ==
      value: true
    actions:
      - action: set
        target: format_literacy_confirmed
        value: true
      - action: set
        target: schema_constructs_confirmed
        value: true
  - kind: checkpoint
    id: constructs-confirmed
    condition:
      type: and
      conditions:
        - type: simple
          variable: is_review_mode
          operator: "!="
          value: true
        - type: simple
          variable: is_update_mode
          operator: "!="
          value: true
    message: Here are the schema constructs I've identified as applicable to this workflow. Does this coverage look right?
    options:
      - id: confirmed
        label: Yes, these are the right constructs
        description: Construct coverage confirmed.
        effect:
          setVariable:
            schema_constructs_confirmed: true
      - id: adjust
        label: Needs adjustment
        description: Construct list requires additions or removals before proceeding.
transitions:
  - to: quality-review
    condition:
      type: and
      conditions:
        - type: simple
          variable: is_review_mode
          operator: ==
          value: true
        - type: simple
          variable: review_scope_confirmed
          operator: ==
          value: true
  - to: requirements-refinement
    condition:
      type: and
      conditions:
        - type: simple
          variable: format_literacy_confirmed
          operator: ==
          value: true
        - type: simple
          variable: schema_constructs_confirmed
          operator: ==
          value: true
    isDefault: true
outcome:
  - The workflow knows whether it is creating, updating, or reviewing, and against which target — every downstream branch can route on a confirmed operation
  - The user-confirmed design intent gives drafting a stable north star to build toward
  - The agent can author schema-correct YAML without re-deriving syntax or guessing which constructs apply
  - The set of schema constructs in play is agreed up front, so drafting reaches for the right construct instead of falling back to prose

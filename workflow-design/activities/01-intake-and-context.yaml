id: intake-and-context
version: 1.8.0
name: Intake and Context
description: "Establish the operation type, mode, and target for the request, and internalize the schema system and YAML-format conventions that ground all drafting."
required: true
steps:
  - kind: action
    id: bind-planning-folder-path
    actions:
      - action: set
        target: planning_folder_path
        message: Server-resolved canonical absolute planning folder from the start_session / get_workflow summary (under the server's workspace .engineering planning root). Write location for ALL of this design session's planning artifacts.
  - kind: technique
    id: intake-classification
    technique: intake-classification
  - kind: technique
    id: persist-structural-inventory
    technique:
      name: work-package::manage-artifacts::write-artifact
      inputs:
        bare_filename: structural-inventory.md
        artifact_content: structural_inventory
        target_dir: planning_folder_path
    condition:
      type: or
      conditions:
        - type: simple
          variable: operation_type
          operator: ==
          value: update
        - type: simple
          variable: operation_type
          operator: ==
          value: review
  - kind: checkpoint
    id: design-intent-batch
    condition:
      type: and
      conditions:
        - type: simple
          variable: intent_needs_confirmation
          operator: ==
          value: true
        - type: simple
          variable: update_seeded_from_review
          operator: "!="
          value: true
    message: "Design intent needs confirmation — classified `{operation_type}` for `{workflow_id}` (mode ambiguous={operation_type_ambiguous}, change_request_clear={change_request_clear})."
    blocking: true
    options:
      - id: confirm-intent
        label: Confirm classified intent
        description: Accept the classified mode, target, and change request as stated.
        effect:
          setVariable:
            intent_needs_confirmation: false
            review_scope_confirmed: true
      - id: confirm-create
        label: Create a new workflow
        description: Correct classification to create mode.
        effect:
          setVariable:
            operation_type: create
            operation_type_ambiguous: false
            intent_needs_confirmation: false
      - id: confirm-update
        label: Update an existing workflow
        description: Correct classification to update mode.
        effect:
          setVariable:
            operation_type: update
            operation_type_ambiguous: false
            intent_needs_confirmation: false
      - id: wrong-review-target
        label: Wrong review target set
        description: Rejects the review target set; supply a corrected `target_workflow_ids` list.
        effect:
          setVariable:
            review_scope_confirmed: false
            intent_needs_confirmation: true
      - id: cancel-as-create
        label: Cancel update — create new instead
        description: Abandon the update path; flip mode to create.
        effect:
          setVariable:
            operation_type: create
            operation_type_ambiguous: false
            intent_needs_confirmation: false
  - kind: action
    id: announce-certain-intent
    condition:
      type: and
      conditions:
        - type: simple
          variable: intent_needs_confirmation
          operator: ==
          value: false
        - type: simple
          variable: update_seeded_from_review
          operator: "!="
          value: true
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
    actions:
      - action: message
        message: "Classified as a {operation_type} operation for workflow `{workflow_id}` — proceeding without Gate 1."
  - kind: action
    id: announce-certain-review-scope
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: ==
          value: review
        - type: simple
          variable: intent_needs_confirmation
          operator: ==
          value: false
    actions:
      - action: set
        target: review_scope_confirmed
        value: true
      - action: message
        message: "Compliance review target set: {target_workflow_ids} ([structural inventory]({structural_inventory_path}))."
  - kind: action
    id: announce-review-seeded-update
    condition:
      type: simple
      variable: update_seeded_from_review
      operator: ==
      value: true
    actions:
      - action: message
        message: "Update seeded from compliance review — mode is update; findings in the [compliance report]({report_path}) are the change specification."
  - kind: action
    id: announce-headless
    condition:
      type: simple
      variable: headless_mode
      operator: ==
      value: true
    actions:
      - action: message
        message: "Headless by default — soft mid-flow gates auto-resolve. Gate 2 (`approve-to-commit`) and safety gaps stay interactive. Say \"interactive\", \"not headless\", or \"with checkpoints\" to opt out."
  - kind: action
    id: announce-interactive
    condition:
      type: simple
      variable: headless_mode
      operator: ==
      value: false
    actions:
      - action: message
        message: "Interactive mode — soft mid-flow gates may present AskQuestion. Gate 2 (`approve-to-commit`) and safety gaps stay interactive."
  - kind: technique
    id: initialize-planning-folder
    technique:
      name: work-package::manage-artifacts::create-readme
      inputs:
        entity_context: "entity_title={workflow_id}; entity_type={operation_type}; status=Planning"
        readme_template: workflow-design/design-context-readme
    condition:
      type: simple
      variable: operation_type
      operator: "!="
      value: review
  - kind: technique
    id: context-loading
    technique: context-loading
  - kind: technique
    id: persist-format-conventions
    technique:
      name: work-package::manage-artifacts::write-artifact
      inputs:
        bare_filename: format-conventions.md
        artifact_content: format_conventions
        target_dir: planning_folder_path
  - kind: technique
    id: persist-applicable-constructs
    technique:
      name: work-package::manage-artifacts::write-artifact
      inputs:
        bare_filename: applicable-constructs.md
        artifact_content: applicable_constructs
        target_dir: planning_folder_path
    condition:
      type: simple
      variable: operation_type
      operator: ==
      value: create
  - kind: technique
    id: present-problem-overview
    technique:
      name: work-package::stakeholder-overview
      inputs:
        readme_section_heading: "## Problem Overview"
        source_material: the requested change, the target workflow's current shape, and any context gathered during this activity
    actions:
      - action: message
        message: "Problem Overview for `{workflow_id}` — plain-language summary ([planning README]({planning_folder_path}/README.md#problem-overview))"
    condition:
      type: simple
      variable: operation_type
      operator: "!="
      value: review
  - kind: action
    id: auto-confirm-literacy
    condition:
      type: simple
      variable: operation_type
      operator: "!="
      value: review
    actions:
      - action: set
        target: format_literacy_confirmed
        value: true
      - action: set
        target: schema_constructs_confirmed
        value: true
  - kind: action
    id: clear-review-seed-flag
    condition:
      type: simple
      variable: update_seeded_from_review
      operator: ==
      value: true
    actions:
      - action: set
        target: update_seeded_from_review
        value: false
transitions:
  - to: quality-review
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: ==
          value: review
        - type: simple
          variable: review_scope_confirmed
          operator: ==
          value: true
  - to: requirements-refinement
    condition:
      type: and
      conditions:
        - type: simple
          variable: format_literacy_confirmed
          operator: ==
          value: true
        - type: simple
          variable: schema_constructs_confirmed
          operator: ==
          value: true
    isDefault: true
outcome:
  - The workflow knows whether it is creating, updating, or reviewing, and against which target — every downstream branch can route on a derived operation
  - Derive-first intent lands gap flags and `{headless_mode}` (default true; false on interactive opt-out); Gate 1 fires only when intent needs confirmation
  - The agent can author schema-correct YAML without re-deriving syntax or guessing which constructs apply
  - Format literacy and schema constructs are auto-confirmed for create/update so drafting reaches for the right construct instead of falling back to prose

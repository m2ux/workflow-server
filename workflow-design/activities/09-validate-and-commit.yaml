id: validate-and-commit
version: 1.8.0
name: Validate and Commit
description: Final validation, scope verification, and README generation/update, then Gate 2 approve-to-commit and commit of the workflow changes on the session feature branch with a pull request opened against the workflows branch (create/update); in review mode the compliance report is committed directly.
required: true
steps:
  - kind: technique
    id: save-compliance-report
    technique:
      name: persist-report
      inputs:
        report_content: "{compliance_report}"
    condition:
      type: simple
      variable: operation_type
      operator: ==
      value: review
  - kind: technique
    id: commit-report
    technique: version-control::commit-regular-files
    condition:
      type: simple
      variable: operation_type
      operator: ==
      value: review
  - kind: technique
    id: run-schema-validation
    technique: audit-schema-validation
    condition:
      type: simple
      variable: operation_type
      operator: "!="
      value: review
  - kind: action
    id: validation-clean
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
        - type: simple
          variable: fail_count
          operator: ==
          value: 0
    actions:
      - action: message
        message: "Schema validation passed — {pass_count} file(s), 0 failed."
  - kind: checkpoint
    id: validation-passed
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
        - type: simple
          variable: fail_count
          operator: ">"
          value: 0
    message: "Schema validation results: {pass_count} passed, {fail_count} failed."
    blocking: false
    defaultOption: proceed
    autoAdvanceMs: 30000
    options:
      - id: proceed
        label: Proceed to commit
        description: Validation outcomes are acceptable for commit
      - id: fix
        label: Fix failures first
        description: Validation failures must be addressed before committing.
  - kind: technique
    id: verify-scope-manifest
    technique: scope-verification
    condition:
      type: simple
      variable: operation_type
      operator: "!="
      value: review
  - kind: action
    id: scope-complete
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
        - type: simple
          variable: unaddressed_count
          operator: ==
          value: 0
    actions:
      - action: message
        message: "Scope manifest verification complete — {addressed_count}/{total_count} items addressed ([scope manifest]({scope_manifest_path}))."
  - kind: checkpoint
    id: scope-verified
    condition:
      type: and
      conditions:
        - type: simple
          variable: operation_type
          operator: "!="
          value: review
        - type: simple
          variable: unaddressed_count
          operator: ">"
          value: 0
    message: "Scope manifest verification: {addressed_count}/{total_count} items addressed ({unaddressed_count} remaining) ([scope manifest]({scope_manifest_path}))."
    blocking: false
    defaultOption: confirmed
    autoAdvanceMs: 30000
    options:
      - id: confirmed
        label: Scope is complete enough
        description: Remaining gaps are acceptable for commit
      - id: fix
        label: Address remaining items
        description: Some scope-manifest items remain unaddressed and require attention.
  - kind: technique
    id: verify-planning-readme
    technique:
      name: work-package::manage-artifacts::verify-readme-conforms
      inputs:
        readme_template: workflow-design/design-context-readme
    condition:
      type: simple
      variable: operation_type
      operator: "!="
      value: review
  - kind: technique
    id: readme-authoring
    technique: readme-authoring
    condition:
      type: simple
      variable: operation_type
      operator: "!="
      value: review
  - kind: checkpoint
    id: approve-to-commit
    condition:
      type: simple
      variable: operation_type
      operator: "!="
      value: review
    message: "Approve commit for workflow '{workflow_id}' ([design specification]({specification_path}), [assumptions log]({assumptions_log}) open judgements when has_open_assumptions={has_open_assumptions}, [impact analysis]({impact_analysis_path}), [draft attestation]({draft_attestation_path}), [planning README]({planning_folder_path}/README.md))."
    blocking: true
    options:
      - id: approved
        label: Approved — commit
        description: The batched design surfaces are reviewed and approved for commit.
      - id: correct-assumptions
        label: Correct open judgements
        description: Open design judgements need correction before commit; return with assumption feedback.
        effect:
          transitionTo: requirements-refinement
      - id: return-to-draft
        label: Return to drafting
        description: The changes are not ready; return to scope-and-draft for revision.
        effect:
          transitionTo: scope-and-draft
  - kind: technique
    id: stage-and-commit
    technique: version-control::commit-regular-files
    condition:
      type: simple
      variable: operation_type
      operator: "!="
      value: review
  - kind: technique
    id: verify-commit
    technique: commit-verification
  - kind: technique
    id: publish-workflow-pr
    technique: publish-workflow-pr
    condition:
      type: simple
      variable: operation_type
      operator: "!="
      value: review
  - kind: action
    id: announce-completion
    actions:
      - action: log
        message: Workflow design complete — changes committed and a pull request opened against the workflows branch (create/update), or the compliance report committed (review)
transitions:
  - to: post-update-review
    condition:
      type: simple
      variable: operation_type
      operator: ==
      value: update
  - to: retrospective
    isDefault: true
outcome:
  - Every YAML file passes schema validation, so the workflow is guaranteed loadable and the server will run it without surprise
  - Nothing planned is left undone — every scope-manifest item is accounted for before the work lands
  - Gate 2 (`approve-to-commit`) batches design specification, open judgements, impact, draft attestation, and planning README for a single interactive commit decision
  - The work is committed from the session `{target_path}` worktree on `{workflow_branch}`, with a PR opened against `workflows`

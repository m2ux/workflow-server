id: validate-and-commit
version: 1.4.0
name: Validate and Commit
description: Final validation, scope verification, and README generation/update, then commit of the workflow changes on a feature branch with a pull request opened against the workflows branch (create/update); in review mode the compliance report is committed directly.
required: true
steps:
  - kind: technique
    id: save-compliance-report
    technique: persist-report
    condition:
      type: simple
      variable: is_review_mode
      operator: ==
      value: true
  - kind: technique
    id: commit-report
    technique: version-control::commit-regular-files
    condition:
      type: simple
      variable: is_review_mode
      operator: ==
      value: true
  - kind: technique
    id: run-schema-validation
    technique: audit-schema-validation
    condition:
      type: simple
      variable: is_review_mode
      operator: "!="
      value: true
  - kind: checkpoint
    id: validation-passed
    condition:
      type: simple
      variable: is_review_mode
      operator: "!="
      value: true
    message: "Schema validation results: {pass_count} passed, {fail_count} failed. Proceeding in 30s unless you intervene."
    blocking: false
    defaultOption: proceed
    autoAdvanceMs: 30000
    options:
      - id: proceed
        label: Proceed to commit
        description: Validation outcomes are acceptable for commit (default — auto-proceeds after 30s).
      - id: fix
        label: Fix failures first
        description: Validation failures must be addressed before committing.
  - kind: technique
    id: verify-scope-manifest
    technique: scope-verification
    condition:
      type: simple
      variable: is_review_mode
      operator: "!="
      value: true
  - kind: checkpoint
    id: scope-verified
    condition:
      type: simple
      variable: is_review_mode
      operator: "!="
      value: true
    message: "Scope manifest verification: {addressed_count}/{total_count} items addressed. Proceeding in 30s unless you intervene."
    blocking: false
    defaultOption: confirmed
    autoAdvanceMs: 30000
    options:
      - id: confirmed
        label: Scope is complete
        description: Every scope-manifest item has been addressed (default — auto-proceeds after 30s).
      - id: fix
        label: Address remaining items
        description: Some scope-manifest items remain unaddressed and require attention.
  - kind: technique
    id: verify-planning-readme
    technique:
      name: work-package::manage-artifacts::verify-readme-conforms
      inputs:
        readme_template: workflow-design/design-context-readme
    condition:
      type: simple
      variable: is_review_mode
      operator: "!="
      value: true
  - kind: technique
    id: readme-authoring
    technique: readme-authoring
    condition:
      type: simple
      variable: is_review_mode
      operator: "!="
      value: true
  - kind: checkpoint
    id: pre-commit-attestation
    condition:
      type: simple
      variable: is_review_mode
      operator: "!="
      value: true
    message: "Ready to commit workflow '{workflow_id}' to the workflows worktree. Review the staged changes and confirm sign-off."
    blocking: true
    options:
      - id: approved
        label: Approved — commit
        description: The staged changes are reviewed and approved for commit.
      - id: return-to-draft
        label: Return to drafting
        description: The changes are not ready; return to scope-and-draft for revision.
        effect:
          transitionTo: scope-and-draft
  - kind: technique
    id: prepare-workflow-branch
    technique: prepare-workflow-branch
    condition:
      type: simple
      variable: is_review_mode
      operator: "!="
      value: true
  - kind: technique
    id: stage-and-commit
    technique: version-control::commit-regular-files
    condition:
      type: simple
      variable: is_review_mode
      operator: "!="
      value: true
  - kind: technique
    id: verify-commit
    technique: commit-verification
  - kind: technique
    id: publish-workflow-pr
    technique: publish-workflow-pr
    condition:
      type: simple
      variable: is_review_mode
      operator: "!="
      value: true
  - kind: action
    id: announce-completion
    actions:
      - action: log
        message: Workflow design complete — changes committed and a pull request opened against the workflows branch (create/update), or the compliance report committed (review)
transitions:
  - to: post-update-review
    condition:
      type: simple
      variable: is_update_mode
      operator: ==
      value: true
  - to: retrospective
    isDefault: true
outcome:
  - Every YAML file passes schema validation, so the workflow is guaranteed loadable and the server will run it without surprise
  - Nothing planned is left undone — every scope-manifest item is accounted for before the work lands
  - A human-readable entry point exists for the workflow, so future users and authors can discover and understand it without reading the raw YAML
  - The work is durably landed in the workflows worktree, available to every session that loads the library

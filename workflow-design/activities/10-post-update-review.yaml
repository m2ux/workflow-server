id: post-update-review
version: 1.8.1
name: Post-Update Review
description: Post-commit compliance audit of the updated workflow — expressiveness, conformance, principles, anti-patterns, and schema validation.
required: true
steps:
  - kind: technique
    id: reload-updated-workflow
    technique: reload-workflow
  - kind: technique
    id: audit-expressiveness
    technique: audit-expressiveness
  - kind: technique
    id: persist-post-expressiveness
    technique:
      name: work-package::manage-artifacts::write-artifact
      inputs:
        bare_filename: expressiveness-findings.md
        artifact_content: expressiveness_findings
        target_dir: planning_folder_path
  - kind: technique
    id: audit-conformance
    technique: audit-conformance
  - kind: technique
    id: persist-post-conformance
    technique:
      name: work-package::manage-artifacts::write-artifact
      inputs:
        bare_filename: conformance-findings.md
        artifact_content: conformance_findings
        target_dir: planning_folder_path
  - kind: technique
    id: audit-principles
    technique: audit-principles
  - kind: technique
    id: persist-post-principles
    technique:
      name: work-package::manage-artifacts::write-artifact
      inputs:
        bare_filename: principle-findings.md
        artifact_content: principle_findings
        target_dir: planning_folder_path
  - kind: technique
    id: audit-anti-patterns
    technique: audit-anti-patterns
  - kind: technique
    id: persist-post-anti-patterns
    technique:
      name: work-package::manage-artifacts::write-artifact
      inputs:
        bare_filename: anti-pattern-findings.md
        artifact_content: anti_pattern_findings
        target_dir: planning_folder_path
  - kind: technique
    id: audit-schema-validation
    technique: audit-schema-validation
  - kind: technique
    id: scope-audit
    technique: scope-audit
  - kind: technique
    id: summarize-findings
    technique: summarize-findings
  - kind: technique
    id: save-review-snapshot
    technique:
      name: persist-report
      inputs:
        report_content: "{findings_summary}"
  - kind: action
    id: post-update-clean
    condition:
      type: simple
      variable: review_findings_count
      operator: ==
      value: 0
    actions:
      - action: message
        message: "Post-update review complete — 0 findings ([post-update review]({report_path}))."
  - kind: checkpoint
    id: post-update-disposition
    condition:
      type: simple
      variable: review_findings_count
      operator: ">"
      value: 0
    message: "Post-update review complete. {review_findings_count} findings ([post-update review]({report_path}))."
    options:
      - id: accept
        label: Accept — update complete
        description: Update accepted as-is; proceed to the retrospective.
        effect:
          transitionTo: retrospective
      - id: iterate
        label: Fix findings — start another update cycle
        description: Findings become the change spec for a fresh update cycle starting at intake.
        effect:
          transitionTo: intake-and-context
      - id: revert
        label: Revert commit
        description: Update commit rolled back; flow re-enters intake.
        effect:
          transitionTo: intake-and-context
transitions:
  - to: retrospective
    condition:
      type: simple
      variable: review_findings_count
      operator: ==
      value: 0
    isDefault: true
outcome:
  - The user knows whether the committed update is clean or carries new compliance debt, with severity-rated findings to decide the next move from
  - A dated compliance snapshot of the committed state exists to compare future audits against and to show the update was checked, not assumed

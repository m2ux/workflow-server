id: requirements-refinement
version: 1.9.0
name: Requirements Refinement
description: A confirmed workflow specification across its design dimensions, with the design assumptions it rests on surfaced, reconciled, and reviewed.
required: true
techniques:
  - scatter-gather
steps:
  - kind: checkpoint
    id: design-context
    condition:
      type: simple
      variable: operation_type
      operator: "!="
      value: update
    message: "Optional design context — reference workflows, integration points, or operators and triggers."
    blocking: false
    defaultOption: skip-context
    autoAdvanceMs: 30000
    options:
      - id: provide-context
        label: Provide design context
        description: Capture reference workflows, integration points, and operators before elicitation.
      - id: skip-context
        label: Skip — proceed to elicitation
        description: Proceed without additional design context
  - kind: technique
    id: set-design-dimensions
    technique: derive-design-dimensions
  - kind: technique
    id: synthesize-update-specification
    technique: synthesize-update-specification
    condition:
      type: simple
      variable: operation_type
      operator: ==
      value: update
  - kind: loop
    id: dimension-elicitation-loop
    name: Dimension Elicitation Loop
    loopType: forEach
    variable: current_dimension
    over: design_dimensions
    maxIterations: 12
    condition:
      type: simple
      variable: operation_type
      operator: "!="
      value: update
    steps:
      - kind: technique
        id: prepare-dimension
        technique: prepare-dimension
      - kind: action
        id: surface-dimension-questions
        actions:
          - action: message
            message: "Design dimension `{current_dimension}` — elicit answers to:\n\n{dimension_questions}"
      - kind: technique
        id: capture-dimension
        technique: capture-dimension
  - kind: technique
    id: persist-specification
    technique: persist-design-specification
  - kind: checkpoint
    id: spec-confirmed
    message: "Full specification across the design dimensions ({design_dimensions}): [design specification]({specification_path})."
    blocking: true
    options:
      - id: confirmed
        label: Yes — specification is complete
        description: The captured specification is accurate across all elicited dimensions.
      - id: refine
        label: Needs changes
        description: One or more dimensions require additions, removals, or modifications before drafting.
  - kind: technique
    id: collect-assumptions
    technique:
      name: work-package::review-assumptions::collect
      inputs:
        activity_context: workflow requirements refinement
        assumption_categories: "Activity Boundaries, Checkpoint Necessity, Technique Selection, Rule Scope, Variable State, Schema Construct Choice"
  - kind: technique
    id: reconcile-assumptions
    technique: reconcile-design-assumptions
  - kind: loop
    id: assumption-interview-loop
    name: Assumption Interview Loop
    loopType: forEach
    variable: current_assumption
    over: open_assumptions
    maxIterations: 20
    condition:
      type: simple
      variable: has_open_assumptions
      operator: ==
      value: true
    steps:
      - kind: technique
        id: present-assumption
        technique: work-package::review-assumptions::interview
      - kind: checkpoint
        id: assumption-decision#{current_assumption.id}
        message: "Assumption {current_assumption.id}: {current_assumption.statement}"
        blocking: true
        options:
          - id: accept
            label: Accept assumption
            description: This design assumption is valid — proceed with it.
          - id: reject
            label: Reject assumption
            description: This assumption is wrong — provide a correction.
          - id: defer
            label: Defer
            description: Not enough information to decide now — revisit later.
      - kind: technique
        id: record-decision
        technique: work-package::review-assumptions::record
  - kind: technique
    id: update-assumptions-log
    technique: work-package::review-assumptions::record
transitions:
  - to: impact-analysis
    condition:
      type: simple
      variable: operation_type
      operator: ==
      value: update
  - to: pattern-analysis
    isDefault: true
outcome:
  - A complete workflow specification — purpose, activities, checkpoints, artifacts, variables, techniques, and rules — that the user has confirmed in one batch after elicitation, so drafting proceeds from settled requirements rather than open questions

id: requirements-refinement
version: 1.4.0
name: Requirements Refinement
description: A confirmed workflow specification across its design dimensions, with the design assumptions it rests on surfaced, reconciled, and reviewed.
required: true
techniques:
  - scatter-gather
steps:
  - kind: checkpoint
    id: design-context
    message: "Optional: provide design context before elicitation — reference workflows to model after, integration points, or operators and triggers. Skipping in 30s; elicitation can proceed without it."
    blocking: false
    defaultOption: skip-context
    autoAdvanceMs: 30000
    options:
      - id: provide-context
        label: Provide design context
        description: Capture reference workflows, integration points, and operators before elicitation.
      - id: skip-context
        label: Skip — proceed to elicitation
        description: Proceed without additional design context (default — auto-skips after 30s).
  - kind: technique
    id: set-design-dimensions
    technique: derive-design-dimensions
  - kind: loop
    id: dimension-elicitation-loop
    name: Dimension Elicitation Loop
    loopType: forEach
    variable: current_dimension
    over: design_dimensions
    maxIterations: 12
    steps:
      - kind: technique
        id: elicit-dimension
        technique: elicitation
      - kind: checkpoint
        id: dimension-confirmed
        message: "Here is the {current_dimension} I've captured. Is it accurate and complete?"
        blocking: true
        options:
          - id: confirmed
            label: Yes, that's right
            description: This dimension is accurately captured.
          - id: refine
            label: Needs changes
            description: This dimension requires additions, removals, or modifications.
  - kind: technique
    id: collect-assumptions
    technique:
      name: work-package::review-assumptions::collect
      inputs:
        activity_context: workflow requirements refinement
        assumption_categories: "Activity Boundaries, Checkpoint Necessity, Technique Selection, Rule Scope, Variable State, Schema Construct Choice"
  - kind: technique
    id: reconcile-assumptions
    technique: reconcile-design-assumptions
  - kind: loop
    id: assumption-interview-loop
    name: Assumption Interview Loop
    loopType: forEach
    variable: current_assumption
    over: open_assumptions
    maxIterations: 20
    condition:
      type: simple
      variable: has_open_assumptions
      operator: ==
      value: true
    steps:
      - kind: technique
        id: present-assumption
        technique: work-package::review-assumptions::interview
      - kind: checkpoint
        id: assumption-decision
        message: "Assumption {current_assumption.id}: {current_assumption.statement}"
        blocking: true
        options:
          - id: accept
            label: Accept assumption
            description: This design assumption is valid — proceed with it.
          - id: reject
            label: Reject assumption
            description: This assumption is wrong — provide a correction.
          - id: defer
            label: Defer
            description: Not enough information to decide now — revisit later.
      - kind: technique
        id: record-decision
        technique: work-package::review-assumptions::record
  - kind: technique
    id: update-assumptions-log
    technique: work-package::review-assumptions::record
transitions:
  - to: impact-analysis
    condition:
      type: simple
      variable: is_update_mode
      operator: ==
      value: true
  - to: pattern-analysis
    isDefault: true
outcome:
  - A complete workflow specification — purpose, activities, checkpoints, artifacts, variables, techniques, and rules — that the user has confirmed across every dimension, so drafting proceeds from settled requirements rather than open questions

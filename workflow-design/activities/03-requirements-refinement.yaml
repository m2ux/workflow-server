id: requirements-refinement
version: 1.10.0
name: Requirements Refinement
description: A workflow specification across its design dimensions, with design assumptions surfaced, reconciled in a while-loop, and open judgements deferred to Gate 2.
required: true
techniques:
  - scatter-gather
steps:
  - kind: checkpoint
    id: design-context
    condition:
      type: simple
      variable: operation_type
      operator: "!="
      value: update
    message: "Optional design context — reference workflows, integration points, or operators and triggers."
    blocking: false
    defaultOption: skip-context
    autoAdvanceMs: 30000
    options:
      - id: provide-context
        label: Provide design context
        description: Capture reference workflows, integration points, and operators before elicitation.
      - id: skip-context
        label: Skip — proceed to elicitation
        description: Proceed without additional design context
  - kind: technique
    id: set-design-dimensions
    technique: derive-design-dimensions
  - kind: technique
    id: synthesize-update-specification
    technique: synthesize-update-specification
    condition:
      type: simple
      variable: operation_type
      operator: ==
      value: update
  - kind: loop
    id: dimension-elicitation-loop
    name: Dimension Elicitation Loop
    loopType: forEach
    variable: current_dimension
    over: design_dimensions
    maxIterations: 12
    condition:
      type: simple
      variable: operation_type
      operator: "!="
      value: update
    steps:
      - kind: technique
        id: prepare-dimension
        technique: prepare-dimension
      - kind: action
        id: surface-dimension-questions
        actions:
          - action: message
            message: "Design dimension `{current_dimension}` — elicit answers to:\n\n{dimension_questions}"
      - kind: technique
        id: capture-dimension
        technique: capture-dimension
  - kind: technique
    id: persist-specification
    technique: persist-design-specification
  - kind: checkpoint
    id: spec-confirmed
    message: "Full specification across the design dimensions ({design_dimensions}): [design specification]({specification_path}). Stakeholder attestation at Gate 2."
    blocking: false
    defaultOption: confirmed
    autoAdvanceMs: 30000
    options:
      - id: confirmed
        label: Yes — specification is complete
        description: The captured specification is accurate across all elicited dimensions.
      - id: refine
        label: Needs changes
        description: One or more dimensions require additions, removals, or modifications before drafting.
  - kind: action
    id: announce-specification
    actions:
      - action: message
        message: "Design specification persisted ([design specification]({specification_path})). Open judgements after reconcile batch into Gate 2."
  - kind: technique
    id: collect-assumptions
    technique:
      name: work-package::review-assumptions::collect
      inputs:
        activity_context: workflow requirements refinement
        assumption_categories: "Activity Boundaries, Checkpoint Necessity, Technique Selection, Rule Scope, Variable State, Schema Construct Choice"
  - kind: technique
    id: reconcile-assumptions
    technique: reconcile-design-assumptions
  - kind: loop
    id: assumption-reconciliation
    name: Assumption Reconciliation Loop
    loopType: while
    condition:
      type: simple
      variable: has_resolvable_assumptions
      operator: ==
      value: true
    steps:
      - kind: technique
        id: reconcile-iteration
        technique: reconcile-design-assumptions
  - kind: action
    id: announce-open-judgements
    condition:
      type: simple
      variable: has_open_assumptions
      operator: ==
      value: true
    actions:
      - action: message
        message: "Open design judgements remain after reconcile — batched into Gate 2 (`approve-to-commit`), not interviewed mid-flow."
  - kind: technique
    id: update-assumptions-log
    technique: work-package::review-assumptions::record
transitions:
  - to: impact-analysis
    condition:
      type: simple
      variable: operation_type
      operator: ==
      value: update
  - to: pattern-analysis
    isDefault: true
outcome:
  - A complete workflow specification — purpose, activities, checkpoints, artifacts, variables, techniques, and rules — persisted for drafting, with stakeholder attestation at Gate 2
  - Audit-resolvable design assumptions converge via a while-loop; open judgements remain in the assumptions log for the late approve-to-commit batch

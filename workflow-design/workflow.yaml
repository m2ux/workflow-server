$schema: ../../schemas/workflow.schema.json
id: workflow-design
version: 1.3.0
title: Workflow Design Workflow
description: Guide agents through creating, updating, or reviewing workflow definitions.
author: m2ux
tags:
  - workflow-creation
  - workflow-review
  - workflow-design
  - schema-validation
  - design-principles
  - elicitation
  - conventions
rules:
  workflow:
    - Present approach before implementation — show what will change, how, and in what order before modifying any file
    - One question at a time — each elicitation question and each checkpoint is atomic; never combine multiple questions
    - All YAML files must pass schema validation before commit — run validation on every produced file
    - Content-reducing updates require explicit user approval — flag removed material and get confirmation
    - Define complete scope before execution — enumerate all files to create, modify, or remove before starting
    - Corrections must persist — record corrections and verify compliance at every subsequent checkpoint
    - Non-destructive updates — compare new content against existing content and flag any material being removed
  activity:
    - Never use prose where a formal schema construct exists — steps, checkpoints, decisions, loops, transitions, conditions, triggers, actions, artifacts, and variables must use their dedicated schema fields
    - Never modify schemas during workflow creation — the schema is a fixed constraint; all content must conform as-is
    - Convention over invention — search for existing naming conventions before introducing new patterns
    - Modular over inline — workflow.yaml defines metadata and references; activities, techniques, and resources live in their own files
    - Encode critical constraints as structure, not just text — back rules with checkpoints, conditions, and validate actions
    - Format literacy before content — verify YAML syntax understanding by reading existing files before drafting
    - Every workflow must include a README.md at the root and in each subfolder (activities/, techniques/, resources/) following the style established by the prism workflow.
    - "Ordered-procedure prose is forbidden in any `description` field (activity or step) — a step's procedure lives in its bound technique's `protocol[]`, reached via the structured `step.technique` — either a bare string (`group::operation` or a bare single-file id, no deviations) or an object `{ name, inputs, outputs }` whose `inputs` map carries input deviations and `outputs` map carries output remaps. A BOUND step has NO `description` at all (omit it entirely): the step's `name` is the one-line WHAT label, and the bound technique's `capability` / `protocol` / `rules` carry ALL of the step's semantics. There is NO `step.note` field: any agent-relevant action or constraint that might read as a step caveat is, by nature, technique content — encode it IN the bound technique (as a `## Rules` entry, a protocol step, or an input), never on the step. A caveat that adds no agent value is omitted. Caveat prose never lives in a step `description` or any note."
    - Every step must bind an operation via `step.technique`, EXCEPT a pure action/control step — one whose only effects are `set`/`log`/`emit`/`message` actions and/or a `when` gate and/or a `checkpoint`/`triggers` — which is exempt. A bound step names exactly ONE operation; compound multi-operation steps are split, one operation per step.
    - "`techniques[]` is reserved for activity-wide STRATEGY/capability techniques (e.g. `variable-binding`, `scatter-gather`) — protocols that apply across the activity's steps. It MUST NOT list per-step operations; an operation a step invokes is bound at that step via `step.technique`."
    - Techniques are the universal capability primitive and the FIRST-CLASS extension mechanism. New strategic operations (scatter/gather, variable binding, retry/escalation, voting, dedup, …) are authored as techniques — preferentially universal ones in `meta` — in preference to schema or engine changes. The schema stays a minimal skeleton; capability grows in the technique library as a standard library of strategy primitives.
    - Technique input/output names, shapes, and structures are defined for the technique's INTRINSIC, GENERIC, REUSABLE semantics — never overfit to a specific caller's local variable name or a single usage instance. Resolve a step-vs-technique name mismatch by aligning the CALLER's state variable to the technique's canonical signature (or an explicit `step.technique.inputs` deviation), NOT by bending the technique to the call-site. Signatures MAY be renamed/reshaped to integrate with the binding system, but only toward a better GENERIC form.
    - On completing each activity, update the planning-folder `README.md` progress tracker — mark this activity's row ✅ Complete in the Activity Progress table and set the session Status to the current milestone. (No session README exists in review mode, where the seed step is skipped.)
techniques:
  activity:
    - variable-binding
variables:
  - name: planning_folder_path
    type: string
    description: Path to the unique planning folder for this workflow execution (e.g., .engineering/artifacts/planning/workflow-design-{workflow_id})
  - name: is_update_mode
    type: boolean
    description: Whether update mode is active (modifying an existing workflow rather than creating a new one)
    defaultValue: false
  - name: is_review_mode
    type: boolean
    description: Whether review mode is active (auditing an existing workflow against design principles)
    defaultValue: false
  - name: review_findings_count
    type: number
    description: Total number of compliance findings identified during review
    defaultValue: 0
  - name: user_wants_fixes
    type: boolean
    description: Whether the user opted to fix identified issues after review (transitions to update mode)
    defaultValue: false
  - name: review_scope_confirmed
    type: boolean
    description: "In review mode: whether the user confirmed the target workflow in intake — gates transition to quality-review"
    defaultValue: false
  - name: target_workflow_id
    type: string
    description: ID of the existing workflow to modify (update mode) or to audit (review mode)
  - name: workflow_id
    type: string
    description: The ID of the workflow being created or updated
  - name: format_literacy_confirmed
    type: boolean
    description: Whether the agent has demonstrated YAML format understanding — gates content drafting
    defaultValue: false
  - name: schema_constructs_confirmed
    type: boolean
    description: Whether applicable schema constructs have been identified and confirmed — gates content drafting
    defaultValue: false
  - name: approach_confirmed
    type: boolean
    description: Whether the structural design approach has been confirmed — gates content drafting
    defaultValue: false
  - name: scope_manifest_confirmed
    type: boolean
    description: Whether the complete file manifest has been confirmed — gates content drafting
    defaultValue: false
  - name: all_files_validated
    type: boolean
    description: Whether all YAML files have passed schema validation — gates commit
    defaultValue: false
  - name: requirements_confirmed
    type: boolean
    description: Whether all requirements elicitation checkpoints have been completed — set by the final checkpoint in requirements-refinement
    defaultValue: false
  - name: scope_manifest
    type: array
    description: List of files to create, modify, or remove with full paths and actions
  - name: current_file
    type: object
    description: Current file being drafted during the content drafting loop
  - name: has_unflagged_removals
    type: boolean
    description: True when content drafting detects removals not flagged during impact analysis. Gates the preservation-check checkpoint in content-drafting (update mode).
    defaultValue: false
  - name: needs_audit_fixes
    type: boolean
    description: Whether the quality-review audit passes surfaced findings the user elected to fix. Drives the bounded audit-fix-cycle loop in quality-review (apply fixes, re-run audits, re-assess); reset to false when the content is clean.
    defaultValue: false
  - name: has_critical_finding
    type: boolean
    description: Whether any quality-review audit finding is Critical severity (a schema-invalid or structurally broken construct that must not be committed). Drives the blocker-gate decision that returns to scope-and-draft.
    defaultValue: false
initialActivity: intake-and-context

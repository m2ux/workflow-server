$schema: ../../schemas/workflow.schema.json
id: workflow-design
version: 1.21.0
title: Workflow Design Workflow
description: Guide agents through creating, updating, or reviewing workflow definitions.
author: m2ux
tags:
  - workflow-creation
  - workflow-review
  - workflow-design
  - schema-validation
  - design-principles
  - elicitation
  - conventions
rules:
  activity:
    - Corrections must persist — record corrections and verify compliance at every subsequent checkpoint
    - On completing each activity, update the planning-folder `README.md` progress tracker — mark this activity's row ✅ Complete in the 📊 Progress table and set the header Status line to the current lifecycle state (Planning/Drafting/Reviewing/Complete). (The session README is present in create and update modes, where the seed step runs.)
techniques:
  activity:
    - variable-binding
variables:
  - name: planning_folder_path
    type: string
    description: Path to the unique planning folder for this workflow execution (e.g., .engineering/artifacts/planning/YYYY-MM-DD-workflow-design-{workflow_id})
  - name: operation_type
    type: string
    description: The classified operation for the request — create, update, or review. Sole mode state; gates and technique inputs compare this value directly.
  - name: review_findings_count
    type: number
    description: Total number of compliance findings identified during review
    defaultValue: 0
  - name: update_seeded_from_review
    type: boolean
    description: True when update mode was entered from a review-mode fix disposition (fix-issues or selective-fixes). Suppresses intake re-confirmation on the subsequent pass; cleared at the end of that intake.
    defaultValue: false
  - name: expressiveness_finding_count
    type: number
    description: Count of expressiveness findings from audit-expressiveness.
    defaultValue: 0
  - name: conformance_finding_count
    type: number
    description: Count of convention-conformance divergences from audit-conformance.
    defaultValue: 0
  - name: rule_hygiene_finding_count
    type: number
    description: Count of rule-hygiene findings from audit-rule-hygiene.
    defaultValue: 0
  - name: enforcement_finding_count
    type: number
    description: Count of text-only rules from audit-rule-enforcement.
    defaultValue: 0
  - name: removal_count
    type: number
    description: Count of content removals inventoried by impact-analysis.
    defaultValue: 0
  - name: pass_count
    type: number
    description: Count of YAML files that passed schema validation.
    defaultValue: 0
  - name: fail_count
    type: number
    description: Count of YAML files that failed schema validation.
    defaultValue: 0
  - name: total_count
    type: number
    description: Total scope-manifest items checked by scope-verification.
    defaultValue: 0
  - name: addressed_count
    type: number
    description: Scope-manifest items confirmed addressed by scope-verification.
    defaultValue: 0
  - name: unaddressed_count
    type: number
    description: Scope-manifest items still unaddressed after scope-verification.
    defaultValue: 0
  - name: specification_path
    type: string
    description: Absolute path to the persisted design-specification artifact.
    defaultValue: ""
  - name: format_conventions_path
    type: string
    description: Absolute path to the persisted format-conventions artifact.
    defaultValue: ""
  - name: applicable_constructs_path
    type: string
    description: Absolute path to the persisted applicable-constructs artifact.
    defaultValue: ""
  - name: pattern_analysis_path
    type: string
    description: Absolute path to the persisted pattern-analysis artifact.
    defaultValue: ""
  - name: impact_analysis_path
    type: string
    description: Absolute path to the persisted impact-analysis artifact.
    defaultValue: ""
  - name: scope_manifest_path
    type: string
    description: Absolute path to the persisted scope-manifest artifact.
    defaultValue: ""
  - name: draft_attestation_path
    type: string
    description: Absolute path to the persisted draft-attestation artifact.
    defaultValue: ""
  - name: report_path
    type: string
    description: Absolute path to the persisted compliance or post-update review report.
    defaultValue: ""
  - name: structural_inventory_path
    type: string
    description: Absolute path to the persisted structural-inventory artifact (update/review).
    defaultValue: ""
  - name: drafting_plan_path
    type: string
    description: Absolute path to the persisted per-file drafting-plan artifact.
    defaultValue: ""
  - name: file_review_note_path
    type: string
    description: Absolute path to the persisted per-file review-note artifact.
    defaultValue: ""
  - name: expressiveness_findings_path
    type: string
    description: Absolute path to the persisted expressiveness-findings artifact when findings exist.
    defaultValue: ""
  - name: conformance_findings_path
    type: string
    description: Absolute path to the persisted conformance-findings artifact when findings exist.
    defaultValue: ""
  - name: rule_hygiene_findings_path
    type: string
    description: Absolute path to the persisted rule-hygiene-findings artifact when findings exist.
    defaultValue: ""
  - name: enforcement_findings_path
    type: string
    description: Absolute path to the persisted enforcement-findings artifact when findings exist.
    defaultValue: ""
  - name: verified_findings_path
    type: string
    description: Absolute path to the persisted verified-findings artifact.
    defaultValue: ""
  - name: principle_findings_path
    type: string
    description: Absolute path to the persisted principle-findings artifact (review mode).
    defaultValue: ""
  - name: anti_pattern_findings_path
    type: string
    description: Absolute path to the persisted anti-pattern-findings artifact (review mode).
    defaultValue: ""
  - name: dimension_questions
    type: string
    description: Markdown elicitation prompt for the current design dimension (from prepare-dimension).
    defaultValue: ""
  - name: review_scope_confirmed
    type: boolean
    description: "In review mode: whether the user confirmed the audit target set in intake"
    defaultValue: false
  - name: target_workflow_id
    type: string
    description: ID of the existing workflow to modify (update mode) or the current review-mode audit target (bound per iteration when reviewing multiple workflows)
  - name: target_workflow_ids
    type: array
    description: Ordered list of workflow ids to audit in review mode (one or more). Single-target review uses a one-element list; update mode leaves this unset and uses target_workflow_id.
  - name: workflow_id
    type: string
    description: The ID of the workflow being created or updated
  - name: format_literacy_confirmed
    type: boolean
    description: Whether YAML format understanding has been demonstrated for this session
    defaultValue: false
  - name: schema_constructs_confirmed
    type: boolean
    description: Whether applicable schema constructs have been identified and confirmed
    defaultValue: false
  - name: scope_manifest_confirmed
    type: boolean
    description: Whether the complete file manifest has been confirmed
    defaultValue: false
  - name: scope_manifest
    type: array
    description: List of files to create, modify, or remove with full paths and actions
  - name: current_file
    type: object
    description: Current file being drafted during the content drafting loop
  - name: has_unflagged_removals
    type: boolean
    description: True when content drafting detects removals not flagged during impact analysis. Produced by review-drafted-file.
    defaultValue: false
  - name: needs_audit_fixes
    type: boolean
    description: Whether audit passes surfaced findings the user elected to fix. Reset to false when the content is clean.
    defaultValue: false
  - name: has_critical_finding
    type: boolean
    description: Whether any audit finding is Critical severity (a schema-invalid or structurally broken construct that must not be committed).
    defaultValue: false
  - name: assumptions_log
    type: object
    description: The design-assumptions log surfaced and reviewed during requirements-refinement — each assumption with its category, risk, resolvability, and outcome. Written via work-package::review-assumptions and reconcile-design-assumptions.
  - name: open_assumptions
    type: array
    description: The design assumptions still open after audit reconciliation — the genuine design judgements remaining for interview.
  - name: has_open_assumptions
    type: boolean
    description: Whether open design judgements remain after reconcile-design-assumptions.
    defaultValue: false
  - name: current_assumption
    type: object
    description: "The open assumption under review from open_assumptions. Sub-shape: { id, statement }."
  - name: design_dimensions
    type: array
    description: The ordered design dimensions to elicit in requirements-refinement, set per mode by derive-design-dimensions (create elicits all eight; update skips the already-established activity model, variables, and techniques).
  - name: workflow_branch
    type: string
    description: The feature branch in the workflows repo that the authored/updated workflow's changes are committed to (e.g., workflow/{workflow_id}); set by prepare-workflow-branch in create/update modes.
    defaultValue: ""
  - name: pr_url
    type: string
    description: URL of the pull request opened against the workflows branch for the workflow change (create/update modes).
    defaultValue: ""
  - name: pr_number
    type: string
    description: Number of the pull request opened for the workflow change (create/update modes).
    defaultValue: ""
initialActivity: intake-and-context

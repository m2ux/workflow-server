# Host workspace + engineering roots are bound RW; the server derives planning
# under engineering and feature worktrees under workspace.
# Agents create worktrees on the host before the server writes artifacts.
#
# Paths are overridable via environment variables or a local `.env` file
# (see `.env.example`). Defaults match scripts/install.sh layout.
#
# Host-side MCP vars (WORKFLOW_WORKSPACE, WORKFLOW_DIR, …) are separate from
# CONTAINER_* paths so a shared `.env` can drive both stdio MCP and compose.
#
# UID/GID: run the container as the same user that owns host worktrees
# (user: "${UID}:${GID}") so writes into the RW binds succeed.
services:
  workflow-server:
    build: .
    ports:
      - "${HOST_PORT:-3000}:${PORT:-3000}"
    environment:
      WORKTREE_ROOT: ${CONTAINER_WORKTREE_ROOT:-/var/lib/workflow-server/workspace}
      WORKFLOW_WORKSPACE: ${CONTAINER_WORKTREE_ROOT:-/var/lib/workflow-server/workspace}
      WORKFLOW_SERVER_ENGINEERING_DIR: ${CONTAINER_ENGINEERING_ROOT:-/var/lib/workflow-server/engineering}
      WORKFLOW_SERVER_INSTALL_DIR: ${CONTAINER_INSTALL_DIR:-/var/lib/workflow-server}
      # Optional: override default planning slug (repo mode defaults to artifacts/planning)
      # PLANNING_SLUG: artifacts/planning
      WORKFLOW_DIR: ${CONTAINER_WORKFLOW_DIR:-/app/workflows}
      SCHEMAS_DIR: ${CONTAINER_SCHEMAS_DIR:-/app/schemas}
      TRANSPORT: ${TRANSPORT:-http}
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-3000}
    volumes:
      - type: bind
        source: ${HOST_WORKFLOWS_DIR:-./workflows}
        target: ${CONTAINER_WORKFLOW_DIR:-/app/workflows}
        read_only: true
      - type: bind
        source: ${HOST_SCHEMAS_DIR:-./schemas}
        target: ${CONTAINER_SCHEMAS_DIR:-/app/schemas}
        read_only: true
      # Workspace root: per-repo feature worktrees (default $INSTALL/workspace)
      - type: bind
        source: ${HOST_WORKTREE_ROOT:-${HOME}/.local/share/workflow-server/workspace}
        target: ${CONTAINER_WORKTREE_ROOT:-/var/lib/workflow-server/workspace}
        read_only: false
      # Engineering root: per-repo engineering checkouts (default $INSTALL/engineering)
      - type: bind
        source: ${HOST_ENGINEERING_ROOT:-${HOME}/.local/share/workflow-server/engineering}
        target: ${CONTAINER_ENGINEERING_ROOT:-/var/lib/workflow-server/engineering}
        read_only: false

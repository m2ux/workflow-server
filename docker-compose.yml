# Phase 1 agent-managed worktree layout.
# Agent creates Git worktrees under the host worktree root; the server binds
# that root RW and derives planning paths. No global planning volume.
#
# UID/GID: run the container as the same user that owns host worktrees
# (user: user: "${UID}:${GID}") so writes into the RW bind succeed.
services:
  workflow-server:
    build: .
    ports:
      - "3000:3000"
    environment:
      WORKTREE_ROOT: /worktrees
      # Optional: override default .engineering/artifacts/planning
      # PLANNING_SLUG: .engineering/planning
      WORKFLOW_DIR: /app/workflows
      SCHEMAS_DIR: /app/schemas
      TRANSPORT: http
      HOST: 0.0.0.0
      PORT: "3000"
    volumes:
      - type: bind
        source: ./workflows
        target: /app/workflows
        read_only: true
      - type: bind
        source: ./schemas
        target: /app/schemas
        read_only: true
      # Worktree root: agent creates worktrees here on the host
      - type: bind
        source: ${HOST_WORKTREE_ROOT:-/var/worktrees}
        target: /worktrees
        read_only: false
